name: 자동 분석 (1일 1회)

# KST(UTC+9) 기준 스케줄
# KST 08:00 = UTC 23:00 (전날)
on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00
  workflow_dispatch:        # 수동 실행 (테스트용)

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # data/auto-sessions.json 커밋 권한
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 의존성 설치
        run: pip install google-api-python-client --quiet

      - name: YouTube 관심도 수집
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/youtube_sentiment.py

      - name: 뉴스 수집 & 분석
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/auto-analysis.js

      - name: 결과 커밋 & 푸시
        run: |
          TICKER=$(node -e "console.log(require('./config/ticker.json').ticker)")
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "${TICKER} Auto Bot"
          git add data/auto-sessions.json data/youtube-sentiment.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "auto: ${TICKER} 분석 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            # 동시 실행되는 다른 자동 커밋 워크플로(영상·백테스트·캘린더·프레임)와의
            # push 경쟁(non-fast-forward) 시 실패하지 않도록 fetch→rebase→push 재시도.
            # 단, 같은 파일을 동시에 수정한 실제 충돌은 자동 병합하지 않고 중단해 사람이 판단.
            pushed=""
            for attempt in 1 2 3 4 5; do
              git fetch origin master
              if ! git rebase FETCH_HEAD; then
                git rebase --abort 2>/dev/null || true
                echo "::error::rebase 충돌(같은 파일 동시 변경) — 자동 병합 불가, 수동 확인 필요"
                exit 1
              fi
              if git push origin HEAD:master; then
                pushed=1
                echo "✅ push 성공 (시도 ${attempt}/5)"
                break
              fi
              echo "⚠ push 거부(다른 커밋 먼저 반영됨) — 재시도 ${attempt}/5"
              sleep $((attempt * 5))
            done
            [ -n "$pushed" ] || { echo "::error::5회 재시도 후에도 push 실패 (origin/master 경쟁)"; exit 1; }
          fi
