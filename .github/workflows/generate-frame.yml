name: 영상 프레임 템플릿 생성

# 1회용 — 수동 실행 전용. 자동 스케줄 없음.
# 새 프레임 디자인이 필요할 때만 실행하세요.
on:
  workflow_dispatch:

jobs:
  generate-frame:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install --quiet google-genai Pillow

      - name: Nano Banana로 프레임 이미지 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_frame.py

      - name: 프레임 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "TSLA Auto Bot"
          git add data/frame-template.png
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "auto: 영상 프레임 템플릿 갱신 ($(TZ='Asia/Seoul' date +'%Y-%m-%d KST'))"
            # 동시 실행되는 다른 자동 커밋 워크플로(영상·분석·백테스트·캘린더)와의
            # push 경쟁(non-fast-forward) 시 실패하지 않도록 fetch→rebase→push 재시도.
            # 단, 같은 파일을 동시에 수정한 실제 충돌은 자동 병합하지 않고 중단해 사람이 판단.
            pushed=""
            for attempt in 1 2 3 4 5; do
              git fetch origin master
              if ! git rebase FETCH_HEAD; then
                git rebase --abort 2>/dev/null || true
                echo "::error::rebase 충돌(같은 파일 동시 변경) — 자동 병합 불가, 수동 확인 필요"
                exit 1
              fi
              if git push origin HEAD:master; then
                pushed=1
                echo "✅ push 성공 (시도 ${attempt}/5)"
                break
              fi
              echo "⚠ push 거부(다른 커밋 먼저 반영됨) — 재시도 ${attempt}/5"
              sleep $((attempt * 5))
            done
            [ -n "$pushed" ] || { echo "::error::5회 재시도 후에도 push 실패 (origin/master 경쟁)"; exit 1; }
          fi
