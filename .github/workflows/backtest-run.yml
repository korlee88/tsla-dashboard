name: 백테스트 실행 (매일 자동 + 수동)

on:
  workflow_dispatch:
    inputs:
      year:
        description: '처리할 연도 (비우면 현재 KST 연도)'
        required: false
        default: ''
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 매일 = KST 03:00

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 초기 일괄 실행 대비 (한 해 ~52주 × ~2분); 매일 증분은 5~10분
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 백테스트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKTEST_YEAR: ${{ github.event.inputs.year }}
        run: node scripts/backtest-run.js

      - name: 결과 커밋 & 푸시
        run: |
          TICKER=$(node -e "console.log(require('./config/ticker.json').ticker)")
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "${TICKER} Backtest Bot"
          git add data/backtest-results-*.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            YEAR=$(TZ='Asia/Seoul' date +'%Y')
            git commit -m "backtest: ${TICKER} ${YEAR}년 백테스트 일일 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            # 동시 실행되는 다른 자동 커밋 워크플로(영상·분석·캘린더·프레임)와의
            # push 경쟁(non-fast-forward) 시 실패하지 않도록 fetch→rebase→push 재시도.
            # 단, 같은 파일을 동시에 수정한 실제 충돌은 자동 병합하지 않고 중단해 사람이 판단.
            pushed=""
            for attempt in 1 2 3 4 5; do
              git fetch origin master
              if ! git rebase FETCH_HEAD; then
                git rebase --abort 2>/dev/null || true
                echo "::error::rebase 충돌(같은 파일 동시 변경) — 자동 병합 불가, 수동 확인 필요"
                exit 1
              fi
              if git push origin HEAD:master; then
                pushed=1
                echo "✅ push 성공 (시도 ${attempt}/5)"
                break
              fi
              echo "⚠ push 거부(다른 커밋 먼저 반영됨) — 재시도 ${attempt}/5"
              sleep $((attempt * 5))
            done
            [ -n "$pushed" ] || { echo "::error::5회 재시도 후에도 push 실패 (origin/master 경쟁)"; exit 1; }
          fi
