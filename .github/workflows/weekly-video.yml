name: TSLA 주간 영상 자료 생성

# 주 1회 금요일(KST) 생성 — 한 주를 마무리하며 다음주 전망을 담는다.
# 1차: 금 KST 05:15 (목 UTC 20:15) — 주요 실행
# 2차: 금 KST 07:15 (목 UTC 22:15) — 1차 지연/실패 시 재시도
# (cron 요일은 UTC 기준 목요일=4 — KST로는 금요일 새벽)
# 두 번 모두 오늘 이미 생성됐으면 자동 skip
on:
  schedule:
    - cron: '15 20 * * 4'   # 금 KST 05:15 (1차)
    - cron: '15 22 * * 4'   # 금 KST 07:15 (2차 재시도)
  workflow_dispatch:
    inputs:
      force:
        description: '오늘 이미 생성됐어도 강제 재생성'
        type: boolean
        default: false

jobs:
  build-video-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 오늘 날짜 확인 및 중복 생성 방지
        id: guard
        run: |
          TODAY_KST=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          echo "TODAY_KST=${TODAY_KST}" >> $GITHUB_ENV
          echo "TODAY=${TODAY_KST}" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 강제 재생성 모드 (force=true) — 기존 데이터 덮어쓰기"
          elif [ -f "data/weekly-report/${TODAY_KST}/script.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 오늘(${TODAY_KST}) 각본 이미 생성됨 — 재실행 건너뜀"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📋 오늘(${TODAY_KST}) 각본 생성 필요"
          fi

      - name: Python 3.11 설정
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 한글 폰트 설치
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get install -y fonts-nanum fonts-nanum-extra --quiet

      - name: Python 의존성 설치
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt --quiet

      # ── STEP 1: 대본 + 씬 이미지 생성 ──────────────────────────────────────
      - name: 주간 대본 및 이미지 생성
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/weekly_video_prep.py

      # ── STEP 2: AI 나레이션 + 영상 합성 ────────────────────────────────────
      - name: AI 나레이션 영상 생성
        if: steps.guard.outputs.skip != 'true'
        run: python scripts/weekly_video_make.py

      # ── STEP 3: 대본·이미지 커밋 (영상은 아티팩트로 분리) ────────────────
      - name: 대본·이미지 커밋 & 푸시
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "TSLA Auto Bot"
          git add data/weekly-report/
          # 대용량 MP3/MP4는 커밋 제외
          git restore --staged 'data/weekly-report/**/*.mp3' 2>/dev/null || true
          git restore --staged 'data/weekly-report/**/*.mp4' 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "auto: TSLA 주간 영상 자료 $(TZ='Asia/Seoul' date +'%Y-%m-%d KST')"
            git pull --rebase origin master
            git push
          fi

      # ── STEP 4: 영상 아티팩트 업로드 (30일 보관) ────────────────────────
      - name: 영상 아티팩트 업로드
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tsla-weekly-video-${{ env.TODAY }}
          path: data/weekly-report/*/video.mp4
          retention-days: 30
          if-no-files-found: warn

      # ── STEP 5: GWS 퍼블리시 (YouTube · Sheets · Gmail) ─────────────────
      # 시크릿이 없는 항목은 자동 건너뜀 — 기존 파이프라인에 영향 없음
      - name: GWS 퍼블리시 (YouTube 업로드 · Sheets 기록 · Gmail 발송)
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        env:
          GWS_YOUTUBE_TOKEN:  ${{ secrets.GWS_YOUTUBE_TOKEN }}
          GWS_SA_CREDENTIALS: ${{ secrets.GWS_SA_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python scripts/gws_publish.py
