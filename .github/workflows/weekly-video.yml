name: 격일 영상 자료 생성

# 격일(월·수·금 KST 새벽) 생성 — 최근 흐름을 더 자주 다루고 양산형 탈피(영상마다 훅·관점·색상 변형).
# 1차: 월·수·금 KST 05:15 (UTC 일·화·목 20:15) — 주요 실행
# 2차: 월·수·금 KST 07:15 (UTC 일·화·목 22:15) — 1차 지연/실패 시 재시도
# (cron 요일은 UTC 기준 일=0·화=2·목=4 — KST로는 월·수·금 새벽)
# 같은 날 이미 생성됐으면 자동 skip
#
# ⏸ 자동 스케줄 일시 중지 (2026-06-26): RKLB 대시보드 기준으로 영상 제작
# 파이프라인 재작업 중. 재개하려면 아래 schedule 블록 주석 해제.
on:
  # schedule:
  #   - cron: '15 20 * * 0,2,4'   # 월·수·금 KST 05:15 (1차)
  #   - cron: '15 22 * * 0,2,4'   # 월·수·금 KST 07:15 (2차 재시도)
  workflow_dispatch:
    inputs:
      force:
        description: '오늘 이미 생성됐어도 강제 재생성'
        type: boolean
        default: false

jobs:
  build-video-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 오늘 날짜 확인 및 중복 생성 방지
        id: guard
        run: |
          TODAY_KST=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          echo "TODAY_KST=${TODAY_KST}" >> $GITHUB_ENV
          echo "TODAY=${TODAY_KST}" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 강제 재생성 모드 (force=true) — 기존 데이터 덮어쓰기"
          elif [ -f "data/weekly-report/${TODAY_KST}/script.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ 오늘(${TODAY_KST}) 각본 이미 생성됨 — 재실행 건너뜀"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📋 오늘(${TODAY_KST}) 각본 생성 필요"
          fi

      - name: Python 3.11 설정
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 한글 폰트 + ffmpeg 설치
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get install -y fonts-nanum fonts-nanum-extra ffmpeg --quiet

      - name: Python 의존성 설치
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt --quiet

      # ── STEP 1: 대본 + 씬 이미지 생성 ──────────────────────────────────────
      - name: 대본 및 이미지 생성
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/weekly_video_prep.py

      # ── STEP 2: AI 나레이션 + 영상 합성 ────────────────────────────────────
      - name: AI 나레이션 영상 생성
        if: steps.guard.outputs.skip != 'true'
        run: python scripts/weekly_video_make.py

      # ── STEP 3: 대본·이미지 커밋 (영상은 아티팩트로 분리) ────────────────
      - name: 대본·이미지 커밋 & 푸시
        if: steps.guard.outputs.skip != 'true'
        run: |
          TICKER=$(node -e "console.log(require('./config/ticker.json').ticker)")
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "${TICKER} Auto Bot"
          git add data/weekly-report/
          # 대용량 MP3/MP4는 커밋 제외
          git restore --staged 'data/weekly-report/**/*.mp3' 2>/dev/null || true
          git restore --staged 'data/weekly-report/**/*.mp4' 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "auto: ${TICKER} 영상 자료 $(TZ='Asia/Seoul' date +'%Y-%m-%d KST')"
            # 동시 실행되는 다른 자동 커밋 워크플로(분석·백테스트·캘린더·영상·프레임)와의
            # push 경쟁(non-fast-forward) 시 실패하지 않도록 fetch→rebase→push 재시도.
            # 단, 같은 파일을 동시에 수정한 실제 충돌은 자동 병합하지 않고 중단해 사람이 판단.
            pushed=""
            for attempt in 1 2 3 4 5; do
              git fetch origin master
              if ! git rebase FETCH_HEAD; then
                git rebase --abort 2>/dev/null || true
                echo "::error::rebase 충돌(같은 파일 동시 변경) — 자동 병합 불가, 수동 확인 필요"
                exit 1
              fi
              if git push origin HEAD:master; then
                pushed=1
                echo "✅ push 성공 (시도 ${attempt}/5)"
                break
              fi
              echo "⚠ push 거부(다른 커밋 먼저 반영됨) — 재시도 ${attempt}/5"
              sleep $((attempt * 5))
            done
            [ -n "$pushed" ] || { echo "::error::5회 재시도 후에도 push 실패 (origin/master 경쟁)"; exit 1; }
          fi

      # ── STEP 4: 영상 아티팩트 업로드 (30일 보관) ────────────────────────
      - name: 영상 아티팩트 업로드
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TODAY }}-weekly-video
          path: data/weekly-report/*/video.mp4
          retention-days: 30
          if-no-files-found: warn

      # ── STEP 5: GWS 퍼블리시 (YouTube · Sheets · Gmail) ─────────────────
      # 시크릿이 없는 항목은 자동 건너뜀 — 기존 파이프라인에 영향 없음
      - name: GWS 퍼블리시 (YouTube 업로드 · Sheets 기록 · Gmail 발송)
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true
        env:
          GWS_YOUTUBE_TOKEN:  ${{ secrets.GWS_YOUTUBE_TOKEN }}
          GWS_SA_CREDENTIALS: ${{ secrets.GWS_SA_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        run: python scripts/gws_publish.py
