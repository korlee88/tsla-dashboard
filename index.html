function scoreToColor(s) {
  if (s >= 3)  return '#22c55e';
  if (s >= 1)  return '#86efac';
  if (s === 0) return '#94a3b8';
  if (s >= -2) return '#f97316';
  return '#ef4444';
}

function scoreToPercent(s) {
  return ((s + 5) / 10) * 100;
}

function directionLabel(d) {
  if (d === 'bullish')  return { text: '강세 (Bullish)', color: '#22c55e', bg: 'rgba(34,197,94,0.15)' };
  if (d === 'bearish')  return { text: '약세 (Bearish)', color: '#ef4444', bg: 'rgba(239,68,68,0.15)' };
  return { text: '중립 (Neutral)', color: '#94a3b8', bg: 'rgba(148,163,184,0.1)' };
}

function confidenceDot(c) {
  if (c === 'high')   return { color: '#22c55e', label: '신뢰도 높음' };
  if (c === 'medium') return { color: '#f59e0b', label: '신뢰도 보통' };
  return { color: '#ef4444', label: '신뢰도 낮음 ⚠ 수동 검토 필요' };
}

// ─── API 호출 ─────────────────────────────────────────────────────────────

async function geminiPostWithRetry(apiKey, body, retries = 4) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  let lastError;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    if (res.ok) return res.json();
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    const retryable = res.status === 503 || res.status === 429 || res.status === 500;
    if (!retryable) throw new Error(msg);
    lastError = new Error(msg);
    if (attempt < retries) await new Promise(r => setTimeout(r, (attempt + 1) * 3000 + Math.random() * 1000));
  }
  throw lastError;
}

async function analyzeNews(apiKey, newsItem) {
  const userContent = `Analyze this Tesla-related news for TSLA stock impact:\n\nTitle: ${newsItem.title}\n\nSummary: ${newsItem.summary}\n\nSource: ${newsItem.source} | Date: ${newsItem.date} | Category: ${newsItem.category}`;

  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: [{ role: 'user', parts: [{ text: userContent }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      maxOutputTokens: 8192,
      temperature: 0.2,
      thinkingConfig: { thinkingBudget: 0 },
    },
  };

  const data = await geminiPostWithRetry(apiKey, body);
  addApiUsage('analysis', data.usageMetadata); // 토큰 사용량 추적
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // JSON 파싱 — responseMimeType=application/json 이지만 방어적으로 처리
  const cleaned = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('JSON 파싱 실패: ' + raw.slice(0, 100));
  return JSON.parse(jsonMatch[0]);
}

// ─── 컴포넌트: ImpactGauge ─────────────────────────────────────────────────

function ImpactGauge({ score }) {
  const pct = scoreToPercent(score);
  const col = scoreToColor(score);
  return (
    <div className="mt-3">
      <div className="flex items-center justify-between mb-1">
        <span className="text-xs text-gray-500 font-mono">−5</span>
        <span className="text-xs font-bold" style={{ color: col }}>
          Impact: {score > 0 ? '+' : ''}{score}
        </span>
        <span className="text-xs text-gray-500 font-mono">+5</span>
      </div>
      {/* track */}
      <div className="relative h-3 rounded-full overflow-hidden" style={{ background: '#1e222a' }}>
        {/* gradient background */}
        <div className="absolute inset-0 gauge-track opacity-20 rounded-full" />
        {/* neutral line */}
        <div className="absolute top-0 bottom-0 w-px bg-gray-500 opacity-40" style={{ left: '50%' }} />
        {/* fill */}
        <div
          className="absolute top-0 bottom-0 rounded-full transition-all duration-700"
          style={{
            background: col,
            left: score >= 0 ? '50%' : `${pct}%`,
            width: `${Math.abs(score) * 10}%`,
            boxShadow: `0 0 8px ${col}80`,
          }}
        />
        {/* needle */}
        <div
          className="absolute top-0 bottom-0 w-0.5 rounded-full transition-all duration-700"
          style={{ left: `calc(${pct}% - 1px)`, background: col, boxShadow: `0 0 6px ${col}` }}
        />
      </div>
    </div>
  );
}

}

// ─── 컴포넌트: SummaryPanel ────────────────────────────────────────────────

function SummaryPanel({ results }) {
  const done = Object.values(results).filter(r => r && r.impact_score !== undefined);
  if (done.length === 0) return null;

  const avg = done.reduce((s, r) => s + r.impact_score, 0) / done.length;
  const bullish = done.filter(r => r.direction === 'bullish').length;
  const bearish = done.filter(r => r.direction === 'bearish').length;
  const neutral = done.filter(r => r.direction === 'neutral').length;
  const overall = avg >= 1 ? 'bullish' : avg <= -1 ? 'bearish' : 'neutral';
  const dir = directionLabel(overall);

  // 평균 게이지
  const avgPct = scoreToPercent(Math.round(avg));
  const avgCol = scoreToColor(avg);

  try {

    u.inputTokens  += meta?.promptTokenCount     || 0;
    u.outputTokens += meta?.candidatesTokenCount || 0;
    if (type === 'collect') u.collectCalls++; else u.analysisCalls++;
    u.lastDate = new Date().toISOString().split('T')[0];
    localStorage.setItem(API_USAGE_KEY, JSON.stringify(u));
  } catch {}
}
function resetApiUsage() {

}

function savePriceCache(price, items) {
  try {
    // items의 date를 ISO string으로 직렬화 (Date 객체는 JSON에서 string으로 바뀜)
    const serialized = (items || []).map(d => ({ ...d, date: d.date instanceof Date ? d.date.toISOString() : d.date }));
    localStorage.setItem(PRICE_CACHE_KEY, JSON.stringify({ price, items: serialized, fetchedAt: Date.now() }));
  } catch {}
}
function deserializePriceCache(cache) {
  if (!cache) return null;
  return {
    ...cache,
    items: (cache.items || []).map(d => ({ ...d, date: new Date(d.date) })),
  };
}
// KST 기준 "오늘 7시 이후" 여부 판단 → 캐시 유효성
function isPriceCacheValid(cache) {
  if (!cache || !cache.fetchedAt) return false;
  const nowUtc = Date.now();
  // KST 7:00 = UTC 22:00 전날 → fetchedAt 이후 KST 7시 체크
  const kstNow = new Date(nowUtc + 9 * 3600000); // UTC로 KST 시간 계산
  // 오늘 KST 7:00 의 UTC timestamp
  const kstMidnight = new Date(Date.UTC(kstNow.getUTCFullYear(), kstNow.getUTCMonth(), kstNow.getUTCDate())); // KST 자정 = UTC 자정 (ISO기준)
  const kst7am = kstMidnight.getTime() - 9 * 3600000 + 7 * 3600000; // KST 7시 = kstMidnight(UTC) - 9h + 7h = UTC 전날 22시
  // 현재가 KST 7시 이전이면 kst7am을 하루 당김
  const effectiveKst7am = nowUtc >= kst7am ? kst7am : kst7am - 86400000;
  return cache.fetchedAt >= effectiveKst7am;
}

// OAuth 토큰 발급 (GIS 팝업)
function driveRequestToken(clientId) {
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) {
      reject(new Error('Google Identity Services 미로드')); return;
    }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      callback: (resp) => {
        if (resp.error) reject(new Error(resp.error_description || resp.error));
        else resolve(resp.access_token);
      },
    });
    client.requestAccessToken({ prompt: '' });
  });
}

// Drive에서 기존 파일 ID 검색
async function driveFindFile(token) {

  );

// Drive에서 세션 데이터 읽기
async function driveReadSessions(token) {

  if (!fileId) return [];
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );

// Drive에 세션 데이터 저장 (생성 또는 업데이트)
async function driveWriteSessions(token, sessions) {
  const fileId = await driveFindFile(token);
  const body = JSON.stringify({ sessions, updatedAt: new Date().toISOString() });
  const meta = { name: DRIVE_FILE_NAME, parents: fileId ? undefined : ['appDataFolder'] };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(fileId ? {} : meta)], { type: 'application/json' }));
  form.append('file', new Blob([body], { type: 'application/json' }));

  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const method = fileId ? 'PATCH' : 'POST';

  const res = await fetch(url, { method, headers: { Authorization: `Bearer ${token}` }, body: form });
  if (!res.ok) throw new Error(`Drive 저장 실패 (${res.status})`);
}

// 로컬 + Drive 세션 병합 (합집합, 최신 60개)
function mergeSessions(local, remote) {
  const map = {};
  remote.forEach(s => { if (s?.id) map[s.id] = s; });
  local.forEach(s => { if (s?.id) map[s.id] = s; }); // 로컬이 우선
  return Object.values(map)
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
    .slice(0, 60);
}

async function collectTodayNews(apiKey) {
  const today = new Date().toISOString().split('T')[0];
  const body = {
    tools: [{ google_search: {} }],
    contents: [{
      role: 'user',
      parts: [{ text: `[필수 규칙] title과 summary는 반드시 한국어(Korean)로 작성. 영어 원문은 한국어로 번역할 것. source·category만 영어 유지.\n\nSearch for the latest Tesla (TSLA) and Elon Musk news from today or past 24 hours that could impact Tesla stock.\nOnly include articles from major financial/tech news outlets: Reuters, Bloomberg, CNBC, Wall Street Journal, Financial Times, Associated Press, MarketWatch, Barron's, Seeking Alpha, Electrek, The Verge, TechCrunch, Forbes, CNN Business, Fox Business.\nReturn ONLY a JSON array of exactly 10 most market-impactful items, strictly no duplicates, each from a different angle or event:\n[{"id":1,"title":"(한국어 번역 제목 예: 테슬라, 1분기 인도량 예상치 하회)","summary":"(한국어 2~3문장 요약 예: 테슬라가 2026년 1분기...)","source":"Reuters","date":"${today}","category":"Earnings|Delivery|Product|Competition|Regulatory|Musk|Macro|Energy|Market|Legal"}]\n⚠️ title·summary에 영어 사용 절대 금지. 반드시 한국어로만 작성.\nReturn ONLY the JSON array, no other text.` }]
    }],
    generationConfig: { maxOutputTokens: 8192, temperature: 0.1, thinkingConfig: { thinkingBudget: 0 } }
  };
  const data = await geminiPostWithRetry(apiKey, body);
  addApiUsage('collect', data.usageMetadata); // 토큰 사용량 추적
  // thought 파트를 제외하고 실제 텍스트 파트만 합침 (gemini-2.5-flash thinking 대응)
  const parts = data.candidates?.[0]?.content?.parts || [];
  const raw = parts.filter(p => !p.thought).map(p => p.text || '').join('') || parts[0]?.text || '';
  const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = cleaned.indexOf('[');
  const end   = cleaned.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('뉴스 JSON 파싱 실패: ' + raw.slice(0, 200));
  const items = JSON.parse(cleaned.slice(start, end + 1));
  return items.slice(0, 10).map((n, i) => ({ ...n, id: Date.now() + i }));
}

// ─── 실시간 TSLA 52주 주봉 (Yahoo Finance v8 → 다중 프록시 폴백) ──────────

async function fetchTSLAWeeklyData() {
  const YF = 'https://query1.finance.yahoo.com/v8/finance/chart/TSLA?range=1y&interval=1wk&includePrePost=false';
  const YF2 = 'https://query2.finance.yahoo.com/v8/finance/chart/TSLA?range=1y&interval=1wk&includePrePost=false';

  function parseYahooJSON(json) {
    const result = json?.chart?.result?.[0];
    if (!result) throw new Error('Yahoo Finance 응답 파싱 실패');
    const meta = result.meta || {};
    const timestamps = result.timestamp || [];
    const q = result.indicators?.quote?.[0] || {};
    if (timestamps.length < 4) throw new Error('데이터 부족');
    const items = timestamps.map((ts, i) => ({
      date: new Date(ts * 1000),
      open:  q.open?.[i]  || q.close?.[i] || 0,
      high:  q.high?.[i]  || q.close?.[i] || 0,
      low:   q.low?.[i]   || q.close?.[i] || 0,
      close: q.close?.[i] || 0,
    })).filter(d => d.close > 0 && !isNaN(d.close));
    if (items.length < 4) throw new Error('유효 데이터 부족');
    const livePrice = meta.regularMarketPrice || meta.previousClose;
    const currentPrice = livePrice
      ? Math.round(livePrice * 100) / 100
      : Math.round(items[items.length - 1].close * 100) / 100;
    return { items, currentPrice };
  }

  // 1순위: Yahoo Finance query1 직접
  try {
    const res = await fetch(YF, { cache: 'no-store' });
    if (res.ok) return parseYahooJSON(await res.json());
  } catch {}

  // 2순위: Yahoo Finance query2 직접
  try {
    const res = await fetch(YF2, { cache: 'no-store' });
    if (res.ok) return parseYahooJSON(await res.json());
  } catch {}

  // 3순위: allorigins 프록시 경유
  try {
    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(YF), { cache: 'no-store' });
    if (res.ok) {
      const w = await res.json();
      return parseYahooJSON(JSON.parse(w.contents || '{}'));
    }
  } catch {}

  // 4순위: corsproxy.io 경유
  try {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(YF), { cache: 'no-store' });
    if (res.ok) return parseYahooJSON(await res.json());
  } catch {}

  // 5순위: thingproxy 경유
  try {
    const res = await fetch('https://thingproxy.freeboard.io/fetch/' + YF, { cache: 'no-store' });
    if (res.ok) return parseYahooJSON(await res.json());
  } catch {}

  throw new Error('주가 데이터를 불러올 수 없습니다 (네트워크 오류)');
}

// Gemini Google Search로 현재 TSLA 주가만 가져오는 폴백
async function fetchPriceViaGemini(apiKey) {
  if (!apiKey) throw new Error('API 키 없음');
  const today = new Date().toISOString().split('T')[0];
  const data = await geminiPostWithRetry(apiKey, {
    tools: [{ google_search: {} }],
    contents: [{ role: 'user', parts: [{ text: `What is the current TSLA Tesla stock price as of ${today}? Reply with ONLY a single decimal number like 247.50. No text, no dollar sign, just the number.` }] }],
    generationConfig: { maxOutputTokens: 30, temperature: 0, thinkingConfig: { thinkingBudget: 0 } },
  });
  const parts = data.candidates?.[0]?.content?.parts || [];
  const raw = parts.filter(p => !p.thought).map(p => p.text || '').join('').trim();
  const price = parseFloat(raw.replace(/[^0-9.]/g, ''));
  if (!price || isNaN(price) || price < 10 || price > 20000) throw new Error('가격 파싱 실패: ' + raw);
  return price;
}

  const db = loadPredAccuracy();
  const now = new Date();
  const forecastDate = now.toISOString().split('T')[0];

  forecast.daily_forecasts.forEach(df => {
    const targetTs  = now.getTime() + df.day * 86400000;
    const targetDate = new Date(targetTs).toISOString().split('T')[0];
    // 같은 예측일+대상일 중복 방지
    if (db.records.some(r => r.forecastDate === forecastDate && r.targetDate === targetDate)) return;
    db.records.push({
      forecastDate,
      targetDate,
      dayLabel:          df.label || `D+${df.day}`,
      basePrice:         Math.round(basePrice * 100) / 100,
      predictedChangePct:df.change_pct ?? 0,
      predictedPrice:    Math.round(basePrice * (1 + (df.change_pct ?? 0) / 100) * 100) / 100,
      predictedSignal:   df.signal || '',
      actualPrice:       null,
      actualChangePct:   null,
      matched:           null,
    });
  });

  // 최근 14일치만 보관, 날짜 내림차순 정렬
  const cutoff = new Date(Date.now() - 14 * 86400000).toISOString().split('T')[0];
  db.records = db.records
    .filter(r => r.targetDate >= cutoff)
    .sort((a, b) => b.targetDate.localeCompare(a.targetDate) || b.forecastDate.localeCompare(a.forecastDate));
  savePredAccuracy(db);
  return db;
}

/** 일봉 데이터 도착 시 실제 종가로 비교 해소 */
function resolvePredictionsWithActual(dailyPrices) {
  if (!dailyPrices?.length) return;
  const db = loadPredAccuracy();
  let updated = false;

  db.records.forEach(rec => {
    if (rec.matched !== null) return;                             // 이미 해소됨
    const bar = dailyPrices.find(d => {
      const ds = (d.date instanceof Date ? d.date : new Date(d.date)).toISOString().split('T')[0];
      return ds === rec.targetDate;
    });
    if (!bar || !bar.close) return;

    rec.actualPrice      = Math.round(bar.close * 100) / 100;
    rec.actualChangePct  = Math.round((bar.close - rec.basePrice) / rec.basePrice * 100 * 100) / 100;
    // 방향 일치 여부 (±0.5% 이하는 보합으로 처리)
    const predDir = rec.predictedChangePct > 0.5 ? 1 : rec.predictedChangePct < -0.5 ? -1 : 0;
    const actDir  = rec.actualChangePct    > 0.5 ? 1 : rec.actualChangePct    < -0.5 ? -1 : 0;
    rec.matched   = predDir === 0 && actDir === 0 ? null : predDir === actDir;
    updated = true;
  });

  if (updated) savePredAccuracy(db);
  return db;
}

async function generateForecast(apiKey, items, currentPrice = 247, calendarEvents = [], scoringCtx = null) {
  const summary = items.map(it =>
    `• [${it.result.direction?.toUpperCase()} ${it.result.impact_score >= 0 ? '+' : ''}${it.result.impact_score}] "${it.title}"\n  Rules:[${it.result.triggered_rules?.join(',')}] Conf:${it.result.confidence}\n  근거: ${it.result.reasoning}`
  ).join('\n\n');

  const calNote = calendarEvents.length > 0
    ? `\n\n향후 예정 이벤트:\n${calendarEvents.map(ev => `- [${ev.confirmed?'확정':'추정'}] ${ev.date} ${ev.category}: ${ev.title}`).join('\n')}`
    : '';

  const body = {
    system_instruction: { parts: [{ text: makeForecastPrompt(currentPrice, calendarEvents, scoringCtx) }] },
    contents: [{ role: 'user', parts: [{ text: `[TSLA 뉴스 분석 결과 — ${items.length}건]${calNote}\n\n${summary}\n\n위 데이터를 바탕으로 Chain-of-Thought 방식으로 분석 후 JSON 전망을 생성하세요.` }] }],
    generationConfig: { responseMimeType: 'application/json', maxOutputTokens: 8192, temperature: 0.25, thinkingConfig: { thinkingBudget: 0 } },
  };
  const data = await geminiPostWithRetry(apiKey, body);
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const m = raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim().match(/\{[\s\S]*\}/);
  if (!m) throw new Error('JSON 파싱 실패: ' + raw.slice(0, 80));
  return JSON.parse(m[0]);
}

function aggregateMonthly(weeklyData) {
  const months = {};
  (weeklyData || []).forEach(w => {
    const d = w.date instanceof Date ? w.date : new Date(w.date);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    if (!months[key]) {
      months[key] = { date: d, open: w.open, high: w.high ?? w.close, low: w.low ?? w.close, close: w.close };
    } else {
      months[key].high  = Math.max(months[key].high,  w.high  ?? w.close);
      months[key].low   = Math.min(months[key].low,   w.low   ?? w.close);
      months[key].close = w.close;
    }
  });
  return Object.entries(months).sort(([a],[b]) => a.localeCompare(b)).map(([,v]) => v);
}

function buildMacroCtxBrowser(macroData, weekStart) {
  if (!macroData) return null;
  const find = (arr, ws) => {
    const t = new Date(ws+'T00:00:00Z').getTime();
    let c=null, m=Infinity;
    for (const p of arr) { const d=Math.abs(p.ts-t); if(d<m){m=d;c=p;} }
    return (!c||m>8*86400000) ? null : c;
  };
  const pct = b => b && b.open>0 ? Math.round((b.close-b.open)/b.open*100*100)/100 : 0;
  const calcRSI = (arr, idx, n=14) => {
    if (idx < n) return 50;
    let g=0, l=0;
    for (let i=idx-n+1; i<=idx; i++) { const ch=arr[i].close-arr[i-1].close; if(ch>0)g+=ch; else l+=Math.abs(ch); }
    if (l===0) return 100;
    return Math.round((100-100/(1+(g/n)/(l/n)))*10)/10;
  };
  const spyB = find(macroData.spy, weekStart);
  const qqqB = find(macroData.qqq, weekStart);
  const vixB = find(macroData.vix, weekStart);
  const tslaTs = new Date(weekStart+'T00:00:00Z').getTime();
  let tIdx = -1, minD = Infinity;
  for (let i=0; i<macroData.tsla.length; i++) {
    const d = Math.abs(macroData.tsla[i].ts - tslaTs);
    if (d < minD) { minD = d; tIdx = i; }
  }
  if (minD > 8*86400000) tIdx = -1;
  return {
    spyChg:      spyB ? pct(spyB) : 0,
    qqqChg:      qqqB ? pct(qqqB) : 0,
    vixClose:    vixB ? vixB.close : null,
    prevTslaChg: (tIdx > 0) ? pct(macroData.tsla[tIdx-1]) : 0,
    rsi:         (tIdx > 14) ? calcRSI(macroData.tsla, tIdx-1) : null,
  };
}

function calcEnhancedScoreBrowser({ avgScore, topRules=[], bullish=0, bearish=0, macroCtx }) {
  let bi = Math.min(100, Math.max(0, Math.round((avgScore + 5) / 10 * 100)));
  const layers = { base: bi };
  const r08 = topRules.includes('R08'), r24 = topRules.includes('R24');
  if (r24 && !r08) { bi = Math.min(100, bi + 9); layers.r24Discount = +9; }
  const dist = bi - 50;
  if (Math.abs(dist) >= 20) { const before = bi; bi = Math.max(0, Math.min(100, Math.round(50 + dist * 1.15))); layers.strongAmp = bi - before; }
  if (macroCtx) {
    const macro = ((macroCtx.spyChg||0) + (macroCtx.qqqChg||0)) / 2;
    if (Math.abs(macro) >= 1.5) { const b=bi; bi = Math.max(0, Math.min(100, bi + Math.round(macro * 2.5))); layers.macroOverlay = bi - b; }
    if (macroCtx.prevTslaChg < -10) { bi = Math.min(100, bi + 10); layers.meanReversion = +10; }
    else if (macroCtx.prevTslaChg > 12) { bi = Math.max(0, bi - 6); layers.meanReversion = -6; }
    if (macroCtx.vixClose && macroCtx.vixClose > 30) { const b=bi; bi = Math.round(50 + (bi-50)*0.8); layers.vixDamping = bi - b; }
    if (macroCtx.rsi !== null && macroCtx.rsi !== undefined) {
      if (macroCtx.rsi < 30) { bi = Math.min(100, bi + 6); layers.rsiAdjust = +6; }
      else if (macroCtx.rsi > 75) { bi = Math.max(0, bi - 4); layers.rsiAdjust = -4; }
    }
  }
  bi = Math.max(0, Math.min(100, Math.round(bi)));
  let direction;
  if (bi >= 57) direction = 'bullish';
  else if (bi <= 43) direction = 'bearish';
  else direction = bullish > bearish ? 'bullish' : bearish > bullish ? 'bearish' : (avgScore < 0 ? 'bearish' : 'bullish');
  return { buyIndex: bi, direction, layers };
}

  const items = JSON.parse(clean.slice(s, e + 1));
  return items.slice(0, 10).map((n, i) => ({ ...n, id: `${weekStart}-${i}` }));
}

async function analyzeWeekBatch(apiKey, newsItems, macroCtx = null) {
  if (!newsItems || newsItems.length === 0) return null;
  const analyses = [];
  for (let i = 0; i < newsItems.length; i++) {
    try { analyses.push(await analyzeNews(apiKey, newsItems[i])); } catch {}
    if (i < newsItems.length - 1) await new Promise(r => setTimeout(r, 700));
  }
  if (analyses.length === 0) return null;
  const scores   = analyses.map(a => a.impact_score || 0);
  const avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10;
  const bullish  = analyses.filter(a => a.direction === 'bullish').length;
  const bearish  = analyses.filter(a => a.direction === 'bearish').length;
  const ruleCnt  = {};
  analyses.forEach(a => (a.triggered_rules || []).forEach(r => { ruleCnt[r] = (ruleCnt[r] || 0) + 1; }));
  const topRules = Object.entries(ruleCnt).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([r]) => r);
  // ── 다층 강화 채점 모델 v2.0 (백테스트 ±2% 이상 움직인 주 72%) ──────────
  const enhanced = calcEnhancedScoreBrowser({ avgScore, topRules, bullish, bearish, macroCtx });
  return {
    avgScore, buyIndex: enhanced.buyIndex, direction: enhanced.direction,
    bullish, bearish, neutral: analyses.length - bullish - bearish,
    topRules, scoringLayers: enhanced.layers, macroCtx, modelVersion: '2.0',
  };
}

// ─── 컴포넌트: CandlestickChart (일봉 / 주봉 / 월봉 토글) ──────────────────

function WeeklyCandlestickChart({ data }) {
  const [mode, setMode] = React.useState('weekly'); // 'daily' | 'weekly' | 'monthly'
  // 일봉: localStorage 캐시에서 초기값 복원
  const [dailyData,    setDailyData]    = React.useState(() => {
    const c = loadDailyCache();
    if (!c || !isPriceCacheValid(c)) return null;
    return deserializeDailyCache(c);
  });
  const [dailyLoading, setDailyLoading] = React.useState(false);
  const [dailyError,   setDailyError]   = React.useState(null);

  // 일봉 선택 시 자동 fetch (캐시 유효하면 스킵)
  React.useEffect(() => {
    if (mode !== 'daily' || dailyData || dailyLoading) return;
    // 캐시 재확인 (컴포넌트 마운트 후 캐시가 있을 수 있음)
    const cache = loadDailyCache();
    if (isPriceCacheValid(cache)) {
      const cached = deserializeDailyCache(cache);
      if (cached?.length) { setDailyData(cached); return; }
    }
    setDailyLoading(true); setDailyError(null);
    fetchTSLADailyData()
      .then(items => {
        setDailyData(items);
        saveDailyCache(items); // localStorage에 저장
      })
      .catch(e => setDailyError(e.message))
      .finally(() => setDailyLoading(false));
  }, [mode]);

  if (!data || data.length < 2) return (
    <div className="flex items-center justify-center h-24 text-xs text-gray-600">차트 데이터 없음</div>
  );

  // 모드별 데이터 선택
  const MODES = [
    { key: 'daily',   label: '일봉' },
    { key: 'weekly',  label: '주봉' },
    { key: 'monthly', label: '월봉' },
  ];

  const chartData = mode === 'monthly' ? aggregateMonthly(data)
                  : mode === 'daily'   ? (dailyData || [])
                  : data;

  const W = 700, H = 220;
  const P = { t: 12, r: 56, b: 30, l: 56 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;

  // 일봉 로딩/에러 중간 상태
  if (mode === 'daily' && dailyLoading) return (
    <div style={{ width: '100%' }}>
      <ModeToggle modes={MODES} mode={mode} setMode={setMode} />
      <div className="flex items-center justify-center gap-2 text-xs text-gray-500" style={{ height: H }}>
        <span className="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full spinning" />
        일봉 데이터 로딩 중…
      </div>
    </div>
  );
  if (mode === 'daily' && dailyError) return (
    <div style={{ width: '100%' }}>
      <ModeToggle modes={MODES} mode={mode} setMode={setMode} />
      <div className="flex flex-col items-center justify-center gap-2 text-xs text-gray-600" style={{ height: H }}>
        <span>⚠ {dailyError}</span>
        <button onClick={() => { setDailyData(null); setDailyError(null); }}
          className="px-3 py-1 rounded text-gray-400" style={{ background:'#1C1F26', border:'1px solid #2A2D35' }}>
          재시도
        </button>
      </div>
    </div>
  );
  if (chartData.length < 2) return (
    <div style={{ width: '100%' }}>
      <ModeToggle modes={MODES} mode={mode} setMode={setMode} />
      <div className="flex items-center justify-center h-24 text-xs text-gray-600">데이터 부족</div>
    </div>
  );

  const allP = chartData.flatMap(d => [d.high ?? d.close, d.low ?? d.close]).filter(v => v > 0);
  const minP = Math.min(...allP) * 0.993, maxP = Math.max(...allP) * 1.007;
  const xPos = i => P.l + (i + 0.5) * (cW / chartData.length);
  const yPos = p => P.t + (1 - (p - minP) / (maxP - minP)) * cH;
  const bW = Math.max(1.5, cW / chartData.length - (mode === 'daily' ? 1 : 1.5));
  const yTicks = Array.from({ length: 5 }, (_, i) => minP + (i / 4) * (maxP - minP));

  const lastItem = chartData[chartData.length - 1];
  const prevItem = chartData[chartData.length - 2];
  const curP = lastItem?.close ?? 0;
  const curCol = curP >= (prevItem?.close ?? 0) ? '#22c55e' : '#ef4444';

  // X축 라벨: YYYY/MM — 최소 간격으로 겹침 방지 (2배 여유)
  const minGap = mode === 'daily' ? 10 : mode === 'weekly' ? 9 : 2;
  const labelIndices = [];
  let lastIdx = -999;
  chartData.forEach((_, i) => {
    if (i - lastIdx >= minGap || i === chartData.length - 1) {
      labelIndices.push(i);
      lastIdx = i;
    }
  });

  const fmtLabel = d => {
    const dt = d instanceof Date ? d : new Date(d);
    if (mode === 'daily') {
      return `${String(dt.getMonth() + 1).padStart(2, '0')}/${String(dt.getDate()).padStart(2, '0')}`;
    }
    return `${dt.getFullYear()}/${String(dt.getMonth() + 1).padStart(2, '0')}`;
  };

  return (
    <div style={{ width: '100%' }}>
      <ModeToggle modes={MODES} mode={mode} setMode={setMode} />
      <div style={{ overflowX: 'auto' }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', minWidth: 320, display: 'block' }}>
          {/* Y 그리드 + 좌측 가격 */}
          {yTicks.map(p => (
            <g key={p}>
              <line x1={P.l} y1={yPos(p)} x2={W - P.r} y2={yPos(p)} stroke="#2A2D35" strokeWidth="0.8" strokeDasharray="3,3" />
              <text x={P.l - 5} y={yPos(p) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9.5">${Math.round(p)}</text>
            </g>
          ))}

          {/* 캔들스틱 */}
          {chartData.map((d, i) => {
            const x = xPos(i);
            const up = d.close >= d.open;
            const col = up ? '#22c55e' : '#ef4444';
            const bY = yPos(Math.max(d.open, d.close));
            const bH = Math.max(1, yPos(Math.min(d.open, d.close)) - bY);
            const wickW = mode === 'monthly' ? 1.2 : mode === 'daily' ? 0.7 : 0.8;
            return (
              <g key={i}>
                <line x1={x} y1={yPos(d.high ?? d.close)} x2={x} y2={yPos(d.low ?? d.close)} stroke={col} strokeWidth={wickW} />
                <rect x={x - bW / 2} y={bY} width={bW} height={bH} fill={col} fillOpacity="0.85" />
              </g>
            );
          })}

          {/* 현재가 점선 */}
          <line x1={P.l} y1={yPos(curP)} x2={W - P.r + 2} y2={yPos(curP)} stroke={curCol} strokeWidth="1" strokeDasharray="4,2" />
          <text x={W - P.r + 4} y={yPos(curP) + 3.5} fill={curCol} fontSize="9" fontWeight="700">${Math.round(curP)}</text>

          {/* X축 라벨: YYYY/MM */}
          {labelIndices.map(i => {
            const dt = chartData[i].date instanceof Date ? chartData[i].date : new Date(chartData[i].date);
            return (
              <text key={i} x={xPos(i)} y={H - 8} textAnchor="middle" fill="#6b7280" fontSize="8.5">
                {fmtLabel(dt)}
              </text>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

// 토글 버튼 서브컴포넌트
function ModeToggle({ modes, mode, setMode }) {
  return (
    <div className="flex justify-end mb-1.5 pr-1">
      {modes.map((m, idx) => (
        <button key={m.key} onClick={() => setMode(m.key)}
          className="text-xs px-2.5 py-0.5 transition-colors"
          style={{
            background: mode === m.key ? '#374151' : 'transparent',
            color: mode === m.key ? '#e5e7eb' : '#6b7280',
            border: '1px solid #2A2D35',
            marginLeft: idx > 0 ? -1 : 0,
            borderRadius: idx === 0 ? '4px 0 0 4px' : idx === modes.length - 1 ? '0 4px 4px 0' : 0,
          }}>
          {m.label}
        </button>
      ))}
    </div>
  );
}

// ─── 컴포넌트: ForecastBuyIndexChart ─────────────────────────────────────

function ForecastBuyIndexChart({ forecasts }) {
  const W = 640, H = 170;
  const P = { t: 28, r: 20, b: 38, l: 38 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;
  const xPos = i => P.l + (i / (forecasts.length - 1)) * cW;
  const yPos = v => P.t + (1 - v / 100) * cH;
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';
  const pts = forecasts.map((f, i) => [xPos(i), yPos(f.buy_index)]);
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const areaPath = `M${xPos(0)},${P.t + cH} ` + pts.map(p => `L${p[0]},${p[1]}`).join(' ') + ` L${xPos(forecasts.length - 1)},${P.t + cH}Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" x2="1" y1="0" y2="0">
          {forecasts.map((f, i) => <stop key={i} offset={`${(i / (forecasts.length - 1)) * 100}%`} stopColor={bCol(f.buy_index)} stopOpacity="0.25" />)}
        </linearGradient>
      </defs>
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={P.l} y1={yPos(v)} x2={W - P.r} y2={yPos(v)} stroke={v === 50 ? '#4b5563' : '#2A2D35'} strokeWidth={v === 50 ? 1 : 0.7} strokeDasharray="3,3" />
          <text x={P.l - 5} y={yPos(v) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9">{v}</text>
        </g>
      ))}
      <path d={areaPath} fill="url(#areaGrad)" />
      <path d={linePath} fill="none" stroke="#64748b" strokeWidth="1.5" strokeLinejoin="round" />
      {forecasts.map((f, i) => {
        const x = xPos(i), y = yPos(f.buy_index), col = bCol(f.buy_index);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="5" fill={col} stroke="#0D0F14" strokeWidth="2" />
            <text x={x} y={y - 10} textAnchor="middle" fill={col} fontSize="11" fontWeight="700">{f.buy_index}</text>
            <text x={x} y={H - 20} textAnchor="middle" fill={col} fontSize="8.5">{f.signal}</text>
            <text x={x} y={H - 8} textAnchor="middle" fill="#9ca3af" fontSize="10" fontWeight="600">{f.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── 컴포넌트: PredAccuracyCard ──────────────────────────────────────────────

function PredAccuracyCard({ dailyData }) {
  const [records, setRecords]       = React.useState(() => loadPredAccuracy().records);
  const [ownDaily, setOwnDaily]     = React.useState(null);
  const [loadingD,  setLoadingD]    = React.useState(false);

  // 일봉 데이터 자체 로드 (3개월치) — prop이 없거나 주봉만 있을 때 직접 fetch
  React.useEffect(() => {
    setLoadingD(true);
    fetchTSLADailyData()
      .then(d => setOwnDaily(d))
      .catch(() => {})
      .finally(() => setLoadingD(false));
  }, []);

  // 일봉 해소: prop(weeklyData)보다 ownDaily(daily)를 우선
  const priceData = ownDaily?.length ? ownDaily : dailyData;

  React.useEffect(() => {
    if (!priceData?.length) return;
    const db = loadPredAccuracy();
    let updated = false;
    db.records.forEach(rec => {
      if (rec.matched !== null) return;
      const bar = priceData.find(d => {
        const ds = (d.date instanceof Date ? d.date : new Date(d.date)).toISOString().split('T')[0];
        return ds === rec.targetDate;
      });
      if (!bar?.close) return;
      rec.actualPrice     = Math.round(bar.close * 100) / 100;
      rec.actualChangePct = Math.round((bar.close - rec.basePrice) / rec.basePrice * 100 * 100) / 100;
      const pDir = rec.predictedChangePct > 0.5 ? 1 : rec.predictedChangePct < -0.5 ? -1 : 0;
      const aDir = rec.actualChangePct    > 0.5 ? 1 : rec.actualChangePct    < -0.5 ? -1 : 0;
      rec.matched = (pDir === 0 && aDir === 0) ? null : pDir === aDir;
      updated = true;
    });
    if (updated) { savePredAccuracy(db); setRecords([...db.records]); }
  }, [priceData]);

  // D+1 (내일) 예측만 날짜별 1건씩 — 최근 7일
  const today = new Date().toISOString().split('T')[0];
  const daily1 = records
    .filter(r => r.dayLabel === '내일' || r.dayLabel === 'D+1')
    .filter((r, i, arr) => arr.findIndex(x => x.targetDate === r.targetDate) === i) // 날짜 중복 제거
    .filter(r => r.targetDate <= today)   // 미래 날짜 제외 (아직 마감 안 됨)
    .slice(0, 7);

  // 오늘 또는 미래 예측 (아직 해소 안 된 것) — 예정 표시용
  const pending = records
    .filter(r => (r.dayLabel === '내일' || r.dayLabel === 'D+1') && r.targetDate > today)
    .filter((r, i, arr) => arr.findIndex(x => x.targetDate === r.targetDate) === i)
    .slice(0, 1);

  const resolved  = daily1.filter(r => r.matched !== null);
  const correct   = resolved.filter(r => r.matched === true);
  const accuracy  = resolved.length > 0 ? Math.round(correct.length / resolved.length * 100) : null;
  const accColor  = accuracy == null ? '#6b7280' : accuracy >= 70 ? '#22c55e' : accuracy >= 50 ? '#f59e0b' : '#ef4444';

  const pctColor = v => v == null ? '#6b7280' : v > 0.5 ? '#22c55e' : v < -0.5 ? '#ef4444' : '#9ca3af';
  const pctStr   = v => v == null ? '─' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';

  return (
    <div className="rounded-xl border overflow-hidden mt-5" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
      {/* 헤더 */}
      <div className="px-5 py-3 border-b flex items-center justify-between" style={{ borderColor: '#2A2D35', background: '#14171e' }}>
        <div className="flex items-center gap-2">
          <span className="text-xs font-bold text-gray-300">🎯 일별 종가 예측 정확도</span>
          <span className="text-xs text-gray-600">최근 7일 · D+1 예측 vs 실제 장 마감</span>
        </div>
        {accuracy != null && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-500">{correct.length}/{resolved.length}건 적중</span>
            <span className="text-sm font-black px-2.5 py-1 rounded-lg" style={{ color: accColor, background: `${accColor}18`, border: `1px solid ${accColor}40` }}>
              {accuracy}%
            </span>
          </div>
        )}
      </div>

      {/* 예정 행 (미래 예측) */}
      {pending.map(r => (
        <div key={r.targetDate} className="px-5 py-3 border-b flex items-center gap-3 text-xs"
          style={{ borderColor: '#2A2D35', background: 'rgba(99,102,241,0.04)' }}>
          <span className="text-indigo-400 font-bold w-16 shrink-0">📅 {r.targetDate.slice(5).replace('-','/')}</span>
          <span className="text-gray-600 w-12 shrink-0 text-center">예정</span>
          <span style={{ color: pctColor(r.predictedChangePct) }} className="font-bold w-14 text-right shrink-0">
            {pctStr(r.predictedChangePct)}
          </span>
          <span className="text-gray-700 w-16 text-right shrink-0">${r.predictedPrice}</span>
          <span className="text-xs px-1.5 py-0.5 rounded ml-1 shrink-0" style={{ background: '#252830', color: '#9ca3af' }}>{r.predictedSignal}</span>
          <span className="ml-auto text-xs text-indigo-400">마감 대기 중…</span>
        </div>
      ))}

      {/* 기록 행 */}
      {daily1.length === 0 && pending.length === 0 ? (
        <div className="py-10 text-center text-xs text-gray-600">
          <p className="text-2xl mb-2">📭</p>
          <p>투자 전망을 생성하면 자동으로 예측 기록이 쌓입니다.</p>
          <p className="mt-1 text-gray-700">매일 장 마감 후 실제 종가와 비교하여 정확도를 계산합니다.</p>
        </div>
      ) : (
        <>
          {/* 테이블 헤더 */}
          <div className="px-5 py-2 grid text-xs text-gray-600 font-semibold border-b"
            style={{ borderColor: '#2A2D35', gridTemplateColumns: '70px 1fr 1fr 1fr 1fr 40px' }}>
            <span>날짜</span>
            <span className="text-center">예측 등락</span>
            <span className="text-center">예측 종가</span>
            <span className="text-center">실제 등락</span>
            <span className="text-center">실제 종가</span>
            <span className="text-center">결과</span>
          </div>
          {daily1.map(r => {
            const isMatch   = r.matched === true;
            const isMiss    = r.matched === false;
            const isPending = r.matched === null && r.actualPrice != null; // 보합
            const rowBg     = isMatch ? 'rgba(34,197,94,0.04)' : isMiss ? 'rgba(239,68,68,0.04)' : 'transparent';
            return (
              <div key={r.targetDate + r.forecastDate}
                className="px-5 py-2.5 grid items-center text-xs border-b"
                style={{ borderColor: '#2A2D35', background: rowBg, gridTemplateColumns: '70px 1fr 1fr 1fr 1fr 40px' }}>
                {/* 날짜 */}
                <span className="text-gray-400 font-medium">
                  {r.targetDate.slice(5).replace('-','/')}
                </span>
                {/* 예측 등락 */}
                <span className="text-center font-bold tabular-nums" style={{ color: pctColor(r.predictedChangePct) }}>
                  {pctStr(r.predictedChangePct)}
                </span>
                {/* 예측 종가 */}
                <span className="text-center text-gray-500">${r.predictedPrice}</span>
                {/* 실제 등락 */}
                <span className="text-center font-bold tabular-nums" style={{ color: pctColor(r.actualChangePct) }}>
                  {r.actualPrice ? pctStr(r.actualChangePct) : <span className="text-gray-700">대기중</span>}
                </span>
                {/* 실제 종가 */}
                <span className="text-center" style={{ color: r.actualPrice ? '#e2e8f0' : '#4b5563' }}>
                  {r.actualPrice ? `$${r.actualPrice}` : '─'}
                </span>
                {/* 결과 */}
                <span className="text-center text-base">
                  {isMatch ? '✅' : isMiss ? '❌' : r.actualPrice ? '🟡' : '⏳'}
                </span>
              </div>
            );
          })}
          {/* 정확도 요약 바 */}
          {resolved.length > 0 && (
            <div className="px-5 py-3" style={{ borderTop: '1px solid #2A2D35' }}>
              <div className="flex items-center gap-3">
                <span className="text-xs text-gray-600">정확도</span>
                <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background: '#252830' }}>
                  <div className="h-full rounded-full transition-all" style={{ width: `${accuracy}%`, background: accColor }} />
                </div>
                <span className="text-xs font-bold tabular-nums" style={{ color: accColor }}>{accuracy}%</span>
                <span className="text-xs text-gray-600">({correct.length}/{resolved.length})</span>
                {accuracy >= 70 && <span className="text-xs text-green-400">🎯 목표 달성</span>}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

};
// v4.0 Confirmation Logic 신호 상태
const SIGNAL_STATE_CFG = {
  strong_bull:    { label: '강력 매수',  emoji: '🚀', color: '#22c55e',  bg: 'rgba(34,197,94,0.12)',   desc: '다중 강세 신호 확인' },
  cautionary_bull:{ label: '주의 매수',  emoji: '⚠️📈', color: '#86efac', bg: 'rgba(134,239,172,0.1)', desc: 'RSI 과매수 또는 공포장 — 분할 진입 권장' },
  bull:           { label: '매수',       emoji: '📈',  color: '#4ade80',  bg: 'rgba(74,222,128,0.1)',   desc: '강세 신호 우세' },
  neutral:        { label: '관망',       emoji: '⏸',   color: '#f59e0b',  bg: 'rgba(245,158,11,0.1)',   desc: '방향성 불명확' },
  bear:           { label: '매도',       emoji: '📉',  color: '#f97316',  bg: 'rgba(249,115,22,0.1)',   desc: '약세 신호 우세' },
  cautionary_bear:{ label: '주의 매도',  emoji: '⚠️📉', color: '#fca5a5', bg: 'rgba(252,165,165,0.1)', desc: 'RSI 과매도 — 반전 가능성 주시' },
  strong_bear:    { label: '강력 매도',  emoji: '🔻',  color: '#ef4444',  bg: 'rgba(239,68,68,0.12)',   desc: '강한 하락 압력' },
};
const RISK_CFG = {
  low:       { color: '#22c55e', label: '낮음' },
  medium:    { color: '#f59e0b', label: '보통' },
  high:      { color: '#f97316', label: '높음' },
  very_high: { color: '#ef4444', label: '매우 높음' },
};

function ForecastPanel({ forecast, loading, error, onRetry, weeklyData, weeklyLoading, weeklyError, currentPrice, priceLastFetch, priceFromCache, priceReady, newsItems = [], newsResults = {}, calendarEvents = [] }) {
  if (loading) return (
    <div className="rounded-xl p-8 border mt-6 flex items-center justify-center gap-3"
      style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
      <span className="w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full spinning" />
      <span className="text-sm text-gray-400">투자 전망 합성 중... (Gemini AI)</span>
    </div>
  );
  if (error) return (
    <div className="rounded-xl p-5 border mt-6" style={{ background: '#1C1F26', borderColor: '#ef444440' }}>
      <p className="text-xs text-red-400 mb-2">⚠ 전망 분석 오류: {error}</p>
      <button onClick={onRetry} className="text-xs px-3 py-1 rounded-lg text-gray-300 hover:text-white"
        style={{ background: '#252830', border: '1px solid #2A2D35' }}>재시도</button>
    </div>
  );
  if (!forecast) return (
    <div className="rounded-xl border mt-6 overflow-hidden" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
      <div className="px-5 py-4 border-b" style={{ borderColor: '#2A2D35', background: '#14171e' }}>
        <h2 className="text-sm font-bold text-gray-200 uppercase tracking-wider">투자 전망 분석</h2>
        <p className="text-xs text-gray-500 mt-0.5">뉴스 종합 · 단기~최장기 5개 시간대</p>
      </div>
      <div className="flex flex-col items-center justify-center py-12 gap-4">
        <span className="text-4xl">🔮</span>
        <div className="text-center">
          <p className="text-sm text-gray-400 font-semibold mb-1">아직 투자 전망이 생성되지 않았습니다</p>
          <p className="text-xs text-gray-600">대시보드에서 뉴스 수집 → 분석 완료 후 자동 생성됩니다</p>
          <p className="text-xs text-gray-700 mt-1">또는 아래 버튼을 클릭하여 직접 생성하세요</p>
        </div>
        {onRetry && (
          <button onClick={onRetry}
            className="px-5 py-2 rounded-lg text-sm font-bold text-white hover:opacity-90 transition-opacity"
            style={{ background: '#E31937' }}>
            ▶ 전망 생성
          </button>
        )}
      </div>
    </div>
  );

  const oSig  = SIGNAL_CFG[forecast.overall_signal] || SIGNAL_CFG['관망'];
  const risk  = RISK_CFG[forecast.risk_level]        || RISK_CFG['medium'];
  const bCol  = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';

  // 예측 기준가 vs 현재가 불일치 감지
  const forecastBasePrice = forecast.current_price ?? 247;
  const displayCurrentPrice = currentPrice ?? forecastBasePrice;
  const priceDiffPct = displayCurrentPrice ? Math.abs((displayCurrentPrice - forecastBasePrice) / forecastBasePrice * 100) : 0;
  const priceStale = priceDiffPct > 3; // 3% 이상 차이나면 경고

  return (
    <div className="rounded-xl border mt-6 overflow-hidden" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
      {/* Header */}
      <div className="px-5 pt-5 pb-4 border-b" style={{ borderColor: '#2A2D35' }}>
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h2 className="text-sm font-bold text-gray-200 uppercase tracking-wider">투자 전망 분석</h2>
            <p className="text-xs text-gray-500 mt-0.5">뉴스 종합 · 단기~최장기 5개 시간대</p>
          </div>
          <div className="flex flex-wrap gap-2 items-center">
            {/* v4.0 신호 상태 배지 */}
            {forecast.signal_state && SIGNAL_STATE_CFG[forecast.signal_state] && (() => {
              const ss = SIGNAL_STATE_CFG[forecast.signal_state];
              return (
                <span className="text-xs font-bold px-2.5 py-1 rounded-lg flex items-center gap-1"
                  style={{ color: ss.color, background: ss.bg, border: `1px solid ${ss.color}40` }}
                  title={ss.desc}>
                  {ss.emoji} {ss.label}
                  {forecast.confirmation_count > 0 && <span className="opacity-70">({forecast.confirmation_count}개 신호)</span>}
                </span>
              );
            })()}
            {/* 확증 편향 통과 여부 */}
            {forecast.bias_check_passed !== undefined && (
              <span className="text-xs px-2 py-0.5 rounded" style={{ background: forecast.bias_check_passed ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)', color: forecast.bias_check_passed ? '#4ade80' : '#f87171', border: `1px solid ${forecast.bias_check_passed ? '#22c55e30' : '#ef444430'}` }}>
                {forecast.bias_check_passed ? '✓ 편향검사 통과' : '⚠ 편향검사 주의'}
              </span>
            )}
            <span className="text-xs px-2 py-1 rounded" style={{ background: '#14171e', border: '1px solid #2A2D35', color: '#94a3b8' }}>
              {weeklyLoading
                ? <span className="animate-pulse">현재가 로딩 중…</span>
                : (() => {
                    const displayPrice = weeklyData ? (weeklyData[weeklyData.length-1]?.close ?? currentPrice) : currentPrice;
                    const timeLabel = priceLastFetch
                      ? new Date(priceLastFetch + 9*3600000).toISOString().replace('T',' ').slice(0,16) + ' KST'
                      : null;
                    if (weeklyData && !priceFromCache) return (
                      <><span>실시간 현재가 </span><strong className="text-white">${displayPrice?.toFixed(2)}</strong><span className="text-gray-600 ml-1">Yahoo Finance</span></>
                    );
                    if (currentPrice && currentPrice !== 247) return (
                      <><span>마지막 조회가 </span><strong className="text-white">${displayPrice?.toFixed(2)}</strong>{timeLabel && <span className="text-gray-600 ml-1" style={{fontSize:9}}>{timeLabel}</span>}</>
                    );
                    return <><span>현재가 </span><strong className="text-white">${forecast.current_price ?? 247}</strong><span className="text-yellow-600 ml-1">추정</span></>;
                  })()
              }
            </span>
            <span className="text-sm font-bold px-3 py-1.5 rounded-lg"
              style={{ color: oSig.color, background: oSig.bg, border: `1px solid ${oSig.color}40` }}>
              {oSig.emoji} {forecast.overall_signal}
            </span>
            <span className="text-xs px-2.5 py-1 rounded-lg"
              style={{ color: risk.color, background: `${risk.color}18`, border: `1px solid ${risk.color}40` }}>
              리스크 {risk.label}
            </span>
            <span className="text-xs px-2.5 py-1 rounded" style={{ background: '#252830', border: '1px solid #2A2D35', color: '#9ca3af' }}>
              Consensus: <strong className="text-gray-300">{forecast.analyst_consensus}</strong>
            </span>
          </div>
        </div>
      </div>

      {/* 가격 불일치 경고 배너 */}
      {priceStale && (
        <div className="mx-5 mt-3 rounded-lg px-3 py-2 flex items-center justify-between gap-2"
          style={{ background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.3)' }}>
          <div className="text-xs text-yellow-400 flex items-center gap-2">
            <span>⚠</span>
            <span>예측 기준가 <strong>${Math.round(forecastBasePrice)}</strong> vs 현재가 <strong>${Math.round(displayCurrentPrice)}</strong> — 차이 {priceDiffPct.toFixed(1)}%, 목표가가 맞지 않을 수 있습니다.</span>
          </div>
          <button onClick={onRetry}
            className="text-xs px-3 py-1 rounded font-semibold shrink-0"
            style={{ background: 'rgba(245,158,11,0.2)', border: '1px solid rgba(245,158,11,0.5)', color: '#f59e0b' }}>
            재생성
          </button>
        </div>
      )}

      {/* 예측 기준가 메타 */}
      <div className="px-5 pt-2 pb-1">
        <span className="text-xs text-gray-700">
          예측 기준가: <span className="text-gray-500">${Math.round(forecastBasePrice)}</span>
          {priceStale
            ? <span className="text-yellow-600 ml-1">· 현재가({displayCurrentPrice?.toFixed(0)})와 다름 — 재생성 권장</span>
            : <span className="text-gray-700 ml-1">· 현재가와 일치</span>
          }
        </span>
      </div>

      {/* 52주 주봉 */}
      <div className="px-5 pt-3">
        <div className="flex items-center gap-2 mb-2">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">TSLA 실제 캔들차트 <span className="text-gray-700 font-normal normal-case">(주봉 / 월봉)</span></p>
          {weeklyLoading && <span className="text-xs text-blue-400 animate-pulse">로딩 중…</span>}
          {weeklyData && <span className="text-xs text-gray-600">출처: Yahoo Finance · 1년</span>}
        </div>
        <div className="rounded-lg p-2" style={{ background: '#14171e', border: '1px solid #2A2D35' }}>
          {weeklyLoading
            ? <div className="flex items-center justify-center h-24 gap-2 text-xs text-gray-500">
                <span className="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full spinning" />
                실시간 주가 데이터 로딩 중…
              </div>
            : weeklyData
              ? <WeeklyCandlestickChart data={weeklyData} />
              : <div className="flex flex-col items-center justify-center h-24 gap-2">
                  <span className="text-xs text-gray-600">차트를 불러올 수 없습니다</span>
                  <button onClick={() => window.location.reload()}
                    className="text-xs px-3 py-1 rounded text-gray-400 hover:text-white transition-colors"
                    style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
                    🔄 새로고침
                  </button>
                </div>
          }
        </div>
      </div>

      {/* 7일 일별 예측 */}
      {forecast.daily_forecasts?.length > 0 && (
        <div className="px-5 pt-4">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">📅 일주일 일별 등락 예측</p>
          <p className="text-xs text-gray-700 mb-2">현재가 기준 예상 등락률 · 실제 주가는 실시간 API 기준</p>
          <div className="grid grid-cols-7 gap-1.5">
            {forecast.daily_forecasts.map(d => {
              const pct = typeof d.change_pct === 'number' ? d.change_pct : 0;
              const isUp = pct > 0;
              const isFlat = pct === 0;
              const pctColor = isFlat ? '#94a3b8' : isUp ? '#22c55e' : '#ef4444';
              const pctBg = isFlat ? 'rgba(148,163,184,0.08)' : isUp ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
              const pctBorder = isFlat ? '#2A2D35' : isUp ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)';
              const isFirst = d.day === 1;
              const sig = SIGNAL_CFG[d.signal] || SIGNAL_CFG['관망'];
              return (
                <div key={d.day} className="rounded-lg p-2 flex flex-col items-center gap-1 text-center"
                  style={{ background: isFirst ? pctBg : '#14171e', border: `1px solid ${isFirst ? pctBorder : '#2A2D35'}` }}>
                  <p className="text-xs font-bold" style={{ color: isFirst ? pctColor : '#6b7280' }}>{d.label}</p>
                  <p className="text-gray-600" style={{ fontSize: 9 }}>{d.date}</p>
                  <p className="text-base font-black" style={{ color: pctColor }}>
                    {isUp ? '+' : ''}{pct.toFixed(1)}%
                  </p>
                  <p className="text-xs font-semibold" style={{ color: sig.color }}>{sig.emoji} {d.signal}</p>
                  <p className="text-gray-600 leading-snug mt-0.5" style={{ fontSize: 9 }}>{d.reasoning}</p>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 매수지수 트렌드 */}
      <div className="px-5 pt-4">
        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">매수지수 트렌드 (0 적극매도 ← 50 중립 → 100 적극매수)</p>
        <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid #2A2D35' }}>
          <ForecastBuyIndexChart forecasts={forecast.forecasts} />
        </div>
      </div>

      {/* 기간별 카드 */}
      <div className="px-5 pt-4">
        <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">기간별 상세 전망</p>
        <div className="grid grid-cols-1 sm:grid-cols-5 gap-2">
          {forecast.forecasts?.map(f => {
            const sig = SIGNAL_CFG[f.signal] || SIGNAL_CFG['관망'];
            const col = bCol(f.buy_index);
            const range = f.target_high - f.target_low;
            const midPct = range > 0 ? ((f.target_mid - f.target_low) / range) * 100 : 50;
            return (
              <div key={f.label} className="rounded-lg p-3 flex flex-col gap-2"
                style={{ background: '#14171e', border: `1px solid ${sig.color}30` }}>
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold text-gray-300">{f.period}</span>
                  <span className="text-xs font-bold" style={{ color: sig.color }}>{f.signal}</span>
                </div>
                {/* 매수지수 바 */}
                <div>
                  <div className="flex justify-between text-xs mb-0.5">
                    <span className="text-gray-600">매수지수</span>
                    <span className="font-bold" style={{ color: col }}>{f.buy_index}</span>
                  </div>
                  <div className="h-1.5 rounded-full" style={{ background: '#2A2D35' }}>
                    <div className="h-full rounded-full" style={{ width: `${f.buy_index}%`, background: col }} />
                  </div>
                </div>
                {/* 목표가 범위 */}
                {(() => {
                  const tLow  = +f.target_low,  tMid = +f.target_mid,  tHigh = +f.target_high;
                  const valid = !isNaN(tLow) && !isNaN(tMid) && !isNaN(tHigh) && tHigh > tLow;
                  const mPct  = valid ? Math.round(((tMid - tLow) / (tHigh - tLow)) * 100) : 50;
                  const basePriceMismatch = priceStale && valid;
                  return (
                    <div>
                      <div className="flex items-center justify-between mb-1">
                        <p className="text-xs text-gray-600">목표가</p>
                        {basePriceMismatch && <span className="text-yellow-600" style={{fontSize:9}}>⚠ 기준가 불일치</span>}
                      </div>
                      {valid ? (
                        <>
                          <div className="text-center leading-tight">
                            <span className="text-xs text-gray-500">${Math.round(tLow)}</span>
                            <span className="text-gray-700 mx-1">~</span>
                            <span className="text-sm font-bold" style={{ color: sig.color }}>${Math.round(tMid)}</span>
                            <span className="text-gray-700 mx-1">~</span>
                            <span className="text-xs text-gray-500">${Math.round(tHigh)}</span>
                          </div>
                          <div className="relative h-1.5 rounded-full mt-1.5" style={{ background: '#2A2D35' }}>
                            <div className="absolute inset-0 rounded-full opacity-20"
                              style={{ background: 'linear-gradient(to right,#ef4444,#22c55e)' }} />
                            <div className="absolute w-2 h-2 rounded-full -top-0.5"
                              style={{ left:`calc(${mPct}% - 4px)`, background: sig.color, boxShadow:`0 0 5px ${sig.color}` }} />
                          </div>
                        </>
                      ) : (
                        <p className="text-xs text-gray-700 text-center">목표가 데이터 없음</p>
                      )}
                    </div>
                  );
                })()}
                <p className="text-xs text-gray-500 leading-snug">{f.reasoning}</p>
              </div>
            );
          })}
        </div>
      </div>

      {/* 촉매 / 리스크 */}
      <div className="px-5 pt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid rgba(34,197,94,0.2)' }}>
          <p className="text-xs font-semibold text-green-400 mb-2">🚀 핵심 상승 촉매</p>
          <ul className="space-y-1">
            {forecast.key_catalysts?.map((c, i) => (
              <li key={i} className="text-xs text-gray-400 flex gap-1.5"><span className="text-green-500 shrink-0">▲</span>{c}</li>
            ))}
          </ul>
        </div>
        <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid rgba(239,68,68,0.2)' }}>
          <p className="text-xs font-semibold text-red-400 mb-2">⚠ 핵심 하락 리스크</p>
          <ul className="space-y-1">
            {forecast.key_risks?.map((r, i) => (
              <li key={i} className="text-xs text-gray-400 flex gap-1.5"><span className="text-red-500 shrink-0">▼</span>{r}</li>
            ))}
          </ul>
        </div>
      </div>

      {/* ── 예측 근거 프레임 ─────────────────────────────────────────────────── */}
      {(() => {
        const analyzed = newsItems.filter(n => newsResults[n.id]);
        const scores   = analyzed.map(n => newsResults[n.id].impact_score);
        const avgScore = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10 : 0;
        const buyIdx   = Math.min(100, Math.max(0, Math.round((avgScore + 5) / 10 * 100)));

        // 룰 카운트
        const ruleCnt = {};
        analyzed.forEach(n => (newsResults[n.id].triggered_rules || []).forEach(r => { ruleCnt[r] = (ruleCnt[r] || 0) + 1; }));
        const topRules = Object.entries(ruleCnt).sort((a, b) => b[1] - a[1]).slice(0, 6);

        // 방향별 분류
        const bull = analyzed.filter(n => newsResults[n.id].direction === 'bullish');
        const bear = analyzed.filter(n => newsResults[n.id].direction === 'bearish');
        const neu  = analyzed.filter(n => newsResults[n.id].direction === 'neutral');

        const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';
        const sCol = s => s > 0 ? '#22c55e' : s < 0 ? '#ef4444' : '#94a3b8';
        const CAL_META = CAL_CATEGORY_META;

        return (
          <div className="mx-5 mt-4 mb-5 rounded-xl border overflow-hidden" style={{ borderColor: '#2A2D35' }}>
            {/* 헤더 */}
            <div className="px-4 py-3 flex items-center gap-2 border-b" style={{ background: '#14171e', borderColor: '#2A2D35' }}>
              <span className="text-xs font-bold tracking-wider text-gray-300">🔍 예측 산출 근거</span>
              <span className="text-xs text-gray-600 ml-1">— Gemini AI가 이 정보를 바탕으로 매수지수를 계산했습니다</span>
            </div>

            <div className="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">

              {/* ① 뉴스 스코어 기여도 */}
              <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid #2A2D35' }}>
                <p className="text-xs font-bold text-gray-400 mb-2.5">📰 뉴스 영향 스코어 ({analyzed.length}건)</p>
                {analyzed.length === 0 ? (
                  <p className="text-xs text-gray-600">분석된 뉴스 없음</p>
                ) : (
                  <>
                    <div className="space-y-1.5 mb-3">
                      {analyzed.map(n => {
                        const r = newsResults[n.id];
                        const s = r.impact_score;
                        const w = Math.abs(s) / 5 * 100;
                        return (

// ─── 컴포넌트: TrendChart ─────────────────────────────────────────────────

function TrendChart({ sessions, prediction, prediction7, weeklyData }) {
  if (!sessions || sessions.length === 0) return (
    <div className="flex flex-col items-center justify-center py-14 text-gray-600">
      <p className="text-3xl mb-3">📭</p>
      <p className="text-sm">저장된 분석 세션이 없습니다.</p>
      <p className="text-xs mt-1">대시보드에서 뉴스를 수집하고 분석을 실행해보세요.</p>
    </div>
  );

  // ── 일별 평균 그룹핑 ──────────────────────────────────────────
  const grouped = {};
  sessions.forEach(s => {
    const date = s.date || '?';
    if (!grouped[date]) grouped[date] = { date, values: [], hasCollected: false };
    const v = s.buyIndex ?? (s.avgScore != null ? Math.round((s.avgScore + 5) / 10 * 100) : null);
    if (v != null && !isNaN(v)) grouped[date].values.push(v);
    if (s.source === 'collected') grouped[date].hasCollected = true;
  });
  const data = Object.entries(grouped)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, g]) => ({
      date,
      value: g.values.length ? Math.round(g.values.reduce((a, b) => a + b, 0) / g.values.length) : null,
      count: g.values.length,
      source: g.hasCollected ? 'collected' : 'sample',
    }))
    .filter(d => d.value != null);

  if (data.length === 0) return <div className="py-8 text-center text-xs text-gray-600">매수지수 데이터가 없습니다.</div>;

  // ── 실제 주가 매핑 (weeklyData → 세션 날짜에 nearest 매핑) ────
  let pricePoints = [];
  const hasPrice = weeklyData && weeklyData.length > 0;
  if (hasPrice) {
    pricePoints = data.map(d => {
      const sessionMs = new Date(d.date).getTime();
      let best = null, bestDiff = Infinity;
      weeklyData.forEach(w => {
        const diff = Math.abs(w.date.getTime() - sessionMs);
        if (diff < bestDiff) { bestDiff = diff; best = w; }
      });
      return best ? best.close : null;
    }).filter(Boolean);
  }
  const hasPriceData = pricePoints.length === data.length && pricePoints.every(p => p != null);
  const priceMin = hasPriceData ? Math.min(...pricePoints) * 0.995 : 0;
  const priceMax = hasPriceData ? Math.max(...pricePoints) * 1.005 : 1;

  const preds = Array.isArray(prediction7) && prediction7.length > 0 ? prediction7 : (prediction ? [prediction] : []);
  const W = 720, H = 260;
  const P = { t: 30, r: hasPriceData ? 62 : 28, b: 60, l: 44 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;

  // 총 슬롯 = 실제 날짜 수 + 예측 개수
  const totalSlots = data.length + preds.length;
  const xPos = i => P.l + (totalSlots <= 1 ? cW / 2 : (i / (totalSlots - 1)) * cW);
  const yPos = v => P.t + (1 - v / 100) * cH;
  const yPosPrice = p => P.t + (1 - (p - priceMin) / (priceMax - priceMin)) * cH;
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';

  const pts = data.map((d, i) => [xPos(i), yPos(d.value)]);
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const areaPath = `M${xPos(0)},${P.t + cH} ` + pts.map(p => `L${p[0]},${p[1]}`).join(' ') + ` L${xPos(data.length - 1)},${P.t + cH}Z`;

  const lastPt = pts[pts.length - 1];
  const predPts = preds.map((p, i) => [xPos(data.length + i), yPos(p.value)]);
  const predPath = lastPt && predPts.length > 0
    ? `M${lastPt[0]},${lastPt[1]} ` + predPts.map(p => `L${p[0]},${p[1]}`).join(' ')
    : null;

  // 주가 선 경로
  const pricePts = hasPriceData ? data.map((d, i) => [xPos(i), yPosPrice(pricePoints[i])]) : [];
  const pricePath = pricePts.length > 1 ? pricePts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ') : null;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="trendGrad" x1="0" x2="1" y1="0" y2="0">
          {data.map((d, i) => <stop key={i} offset={`${(i / Math.max(data.length - 1, 1)) * 100}%`} stopColor={bCol(d.value)} stopOpacity="0.22" />)}
        </linearGradient>
      </defs>

      {/* 그리드 + 좌측 Y라벨 (매수지수) */}
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={P.l} y1={yPos(v)} x2={W - P.r} y2={yPos(v)} stroke={v === 50 ? '#4b5563' : '#2A2D35'} strokeWidth={v === 50 ? 1 : 0.7} strokeDasharray="3,3" />
          <text x={P.l - 5} y={yPos(v) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9">{v}</text>
        </g>
      ))}

      {/* 우측 Y라벨 (실제 주가) */}
      {hasPriceData && [0, 0.25, 0.5, 0.75, 1].map(t => {
        const p = priceMin + t * (priceMax - priceMin);
        const y = P.t + (1 - t) * cH;
        return <text key={t} x={W - P.r + 5} y={y + 3.5} fill="#06b6d4" fontSize="8.5" opacity="0.75">${Math.round(p)}</text>;
      })}

      {/* Zone */}
      <rect x={P.l} y={yPos(100)} width={cW} height={yPos(65) - yPos(100)} fill="rgba(34,197,94,0.04)" />
      <rect x={P.l} y={yPos(65)}  width={cW} height={yPos(45) - yPos(65)}  fill="rgba(245,158,11,0.04)" />
      <rect x={P.l} y={yPos(45)}  width={cW} height={yPos(0)  - yPos(45)}  fill="rgba(239,68,68,0.04)" />

      {/* 매수지수 영역 + 선 */}
      {data.length > 1 && <path d={areaPath} fill="url(#trendGrad)" />}
      {data.length > 1 && <path d={linePath} fill="none" stroke="#475569" strokeWidth="1.8" strokeLinejoin="round" />}

      {/* 실제 주가 오버레이 */}
      {pricePath && (
        <path d={pricePath} fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinejoin="round" opacity="0.85" />
      )}
      {/* 주가 포인트 */}
      {pricePts.map(([x, y], i) => (
        <g key={`pp-${i}`}>
          <circle cx={x} cy={y} r="3.5" fill="#06b6d4" stroke="#0D0F14" strokeWidth="1.5" opacity="0.9" />
          {/* 첫·마지막 포인트에 가격 라벨 */}
          {(i === 0 || i === pricePts.length - 1) && (
            <text x={x} y={y - 8} textAnchor={i === 0 ? 'start' : 'end'} fill="#06b6d4" fontSize="8.5" fontWeight="700" opacity="0.9">
              ${Math.round(pricePoints[i])}
            </text>
          )}
        </g>
      ))}

      {/* 예측 점선 */}
      {predPath && (
        <path d={predPath} fill="none" stroke="#a78bfa" strokeWidth="1.6" strokeDasharray="5,3" opacity="0.7" />
      )}

      {/* 매수지수 포인트 */}
      {data.map((d, i) => {
        const [x, y] = pts[i]; const col = bCol(d.value);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="5.5" fill={col} stroke="#0D0F14" strokeWidth="2" />
            <text x={x} y={y - 11} textAnchor="middle" fill={col} fontSize="10.5" fontWeight="700">{d.value}</text>
            {d.count > 1 && <text x={x} y={y - 22} textAnchor="middle" fill="#6b7280" fontSize="7.5">({d.count}회 평균)</text>}
            <text x={x} y={H - 40} textAnchor="middle" fill="#6b7280" fontSize="8.5" transform={`rotate(-30,${x},${H - 40})`}>{d.date?.slice(5)}</text>
            <text x={x} y={H - 16} textAnchor="middle" fill="#4b5563" fontSize="8">{d.source === 'collected' ? '🔍' : '📋'}</text>
          </g>
        );
      })}

      {/* 7일 예측 포인트 */}
      {preds.map((pred, i) => {
        const [px, py] = predPts[i];
        const col = bCol(pred.value);
        const isFirst = i === 0;
        return (
          <g key={`pred-${i}`}>
            {isFirst
              ? <><circle cx={px} cy={py} r="9" fill="none" stroke={col} strokeWidth="1.5" strokeDasharray="3,2" opacity="0.5" /><circle cx={px} cy={py} r="4.5" fill={col} opacity="0.8" stroke="#0D0F14" strokeWidth="1.5" /></>
              : <circle cx={px} cy={py} r="3.5" fill={col} opacity="0.55" stroke="#0D0F14" strokeWidth="1" />
            }
            {(isFirst || i % 2 === 0) && (
              <text x={px} y={py - (isFirst ? 16 : 11)} textAnchor="middle" fill={col} fontSize={isFirst ? "10" : "8"} fontWeight={isFirst ? "700" : "500"} opacity={isFirst ? 1 : 0.75}>
                {pred.value}
              </text>
            )}
            <text x={px} y={H - 40} textAnchor="middle" fill="#a78bfa" fontSize="7.5" opacity="0.7" transform={`rotate(-30,${px},${H - 40})`}>{pred.dateLabel || `+${pred.day}일`}</text>
            {i === preds.length - 1 && (
              <text x={px} y={H - 16} textAnchor="middle" fill="#7c3aed" fontSize="7" opacity="0.8">({pred.confLabel})</text>
            )}
          </g>
        );
      })}

      <text x={10} y={P.t + cH / 2} textAnchor="middle" fill="#6b7280" fontSize="9" transform={`rotate(-90,10,${P.t + cH / 2})`}>매수지수</text>
      {hasPriceData && <text x={W - 4} y={P.t + cH / 2} textAnchor="middle" fill="#06b6d4" fontSize="9" opacity="0.7" transform={`rotate(90,${W - 4},${P.t + cH / 2})`}>TSLA 주가</text>}
    </svg>
  );
}

function SettingsPage({ onBack,
  apiKey, keyInput, setKeyInput, saveKey,
  driveClientId, driveClientIdInput, setDriveClientIdInput, saveDriveClientId,
  connectDrive, driveSyncing, driveConnected, driveLastSync, driveError,

  // Drive 연결 시 파일 크기 자동 조회
  useEffect(() => {
    const token = getDriveToken?.();
    if (!token || driveFileSize !== null) return;
    setDriveChecking(true);
    getDriveAppDataSize(token)
      .then(bytes => setDriveFileSize(bytes))
      .finally(() => setDriveChecking(false));
  }, [driveConnected]);

  const handleReset = () => {
    if (!confirm('API 사용량 기록을 초기화할까요?')) return;
    resetApiUsage();
    setUsage(getApiUsage());

  // 비용 계산 (Gemini 2.5 Flash, thinkingBudget:0 기준)

  const INPUT_PRICE  = 0.15 / 1_000_000;
  const OUTPUT_PRICE = 0.60 / 1_000_000;
  const manualCostUSD = usage.inputTokens * INPUT_PRICE + usage.outputTokens * OUTPUT_PRICE;
  const manualCostKRW = manualCostUSD * 1380;

  // 자동 분석 월 예상 (4회/일 × 30일 × 16 API calls × 평균 1200 tokens)
  const AUTO_MONTHLY_TOKENS = 4 * 30 * 16 * 1200;
  const autoMonthlyUSD = AUTO_MONTHLY_TOKENS * (INPUT_PRICE * 0.7 + OUTPUT_PRICE * 0.3);
  const autoMonthlyKRW = autoMonthlyUSD * 1380;

  const fmt = (n) => n < 1000 ? n.toString() : n < 1_000_000 ? (n/1000).toFixed(1)+'K' : (n/1_000_000).toFixed(2)+'M';
  const fmtBytes = (b) => b == null ? '─' : b < 1024 ? b+'B' : b < 1024*1024 ? (b/1024).toFixed(1)+'KB' : (b/1024/1024).toFixed(2)+'MB';

  return (
    <div className="max-w-2xl mx-auto px-4 py-6">
      {/* Header */}
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="text-xs px-3 py-1.5 rounded-lg text-gray-400 hover:text-white transition-colors"
          style={{ background: '#252830', border: '1px solid #2A2D35' }}>← 대시보드</button>
        <div>
          <h1 className="text-xl font-bold text-white tracking-tight">⚙ 설정</h1>
          <p className="text-xs text-gray-500">API 키 · 사용량 · Google Drive</p>
        </div>
      </div>

      {/* ── Gemini API Key ── */}
      <div className="rounded-xl p-5 border mb-4" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
        <div className="flex items-center gap-2 mb-4">

// ─── 모바일: 뉴스 카드 (탭으로 접기/펼치기) ───────────────────────────────────
function MobileNewsCard({ news, result, loading, error, onAnalyze, apiKey }) {
  const [open, setOpen] = useState(false);
  const score = result?.impact_score;
  const dir   = result?.direction;
  const sc = dir === 'bullish' ? '#22c55e' : dir === 'bearish' ? '#ef4444' : '#9ca3af';
  const bg = dir === 'bullish' ? 'rgba(34,197,94,0.12)' : dir === 'bearish' ? 'rgba(239,68,68,0.12)' : 'rgba(255,255,255,0.04)';
  const bd = dir === 'bullish' ? 'rgba(34,197,94,0.3)' : dir === 'bearish' ? 'rgba(239,68,68,0.3)' : '#2A2D35';
  return (
    <div className="rounded-xl overflow-hidden" style={{ background: '#1C1F26', border: `1px solid ${bd}` }}>
      <button className="w-full p-3 text-left" onClick={() => setOpen(o => !o)}>
        <div className="flex items-start gap-2.5">
          <div className="shrink-0 w-11 h-11 rounded-lg flex items-center justify-center font-bold text-sm"
            style={{ background: bg, color: sc, border: `1px solid ${bd}` }}>
            {loading
              ? <span className="w-4 h-4 border-2 border-current border-t-transparent rounded-full spinning" />
              : score != null ? (score > 0 ? '+' : '') + score
              : <span className="text-gray-700" style={{ fontSize: 9 }}>미분석</span>}
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-xs font-semibold text-gray-200 leading-snug"
              style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
              {news.title}
            </p>
            <p className="text-xs text-gray-600 mt-0.5">{news.source} · {news.category}</p>
          </div>
          <span className="shrink-0 text-gray-700 text-xs">{open ? '▲' : '▼'}</span>
        </div>
        {result && !open && (
          <div className="flex items-center gap-1.5 mt-2 flex-wrap">
            <span className="text-xs px-1.5 py-0.5 rounded font-semibold" style={{ background: bg, color: sc }}>
              {dir === 'bullish' ? '📈 상승' : dir === 'bearish' ? '📉 하락' : '➡ 중립'}
            </span>
            {result.triggered_rules?.slice(0, 3).map(r => {
              const m = RULES_META[r];
              return m ? <span key={r} className="badge-rule" style={{ color: m.color, borderColor: m.color, background: m.bg }}>{r}</span> : null;
            })}
          </div>
        )}
      </button>
      {open && (
        <div className="border-t px-3 pb-3 pt-2.5 space-y-2" style={{ borderColor: '#2A2D35', background: '#14171e' }}>
          <p className="text-xs text-gray-400 leading-relaxed">{news.summary}</p>
          {result && <>
            <p className="text-xs text-gray-500 italic leading-relaxed">💬 {result.reasoning}</p>
            <div className="flex flex-wrap gap-1 mt-1">
              {result.triggered_rules?.map(r => {
                const m = RULES_META[r];
                return m ? <span key={r} className="badge-rule" style={{ color: m.color, borderColor: m.color, background: m.bg }}>{r}</span> : null;
              })}
            </div>
            <div className="flex gap-2 text-xs mt-1">
              <span className="px-2 py-0.5 rounded font-semibold" style={{ background: bg, color: sc }}>
                {dir === 'bullish' ? '📈 상승' : dir === 'bearish' ? '📉 하락' : '➡ 중립'}
              </span>
              <span className="text-gray-600">{result.confidence === 'high' ? '신뢰도 높음' : result.confidence === 'medium' ? '신뢰도 보통' : '⚠ 신뢰도 낮음'}</span>
            </div>
          </>}
          {!result && !loading && (
            <button onClick={() => onAnalyze(news)} disabled={!apiKey}
              className="w-full py-2 rounded-lg text-xs font-bold text-white disabled:opacity-40"
              style={{ background: '#E31937' }}>▶ 단독 분석</button>
          )}
          {error && <p className="text-xs text-red-400">⚠ {error}</p>}
        </div>
      )}
    </div>
  );
}

// ─── 모바일: 대시보드 메인 ────────────────────────────────────────────────────
function MobileDashboard({

  hasAnyResult, isSaved, driveConnected, currentPrice,

  const bear    = done.filter(r => r.direction === 'bearish').length;
  const neu     = done.length - bull - bear;
  const overall = bull > bear ? 'bullish' : bear > bull ? 'bearish' : 'neutral';

    <div style={{ background: '#0D0F14', minHeight: '100vh', paddingBottom: 72 }}>

            style={{ background: '#E31937' }}>T</div>
          <div>
            <p className="text-sm font-bold text-white leading-tight tracking-tight">TSLA 주가 영향 분석</p>
            <p className="text-xs text-gray-600 leading-tight">
              {currentPrice ? <span className="text-gray-400">${currentPrice}</span> : null}
              {currentPrice ? ' · ' : ''}{new Date().toLocaleDateString('ko-KR')}
            </p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <span className={`flex items-center gap-1 text-xs ${apiKey ? 'text-green-400' : 'text-gray-600'}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${apiKey ? 'bg-green-400' : 'bg-gray-600'}`} />
            {apiKey ? 'API' : 'Key 없음'}
          </span>
          <span className={`text-sm ${driveConnected ? 'text-green-400' : 'text-gray-700'}`}>☁</span>
        </div>
      </div>

      <div className="px-3 pt-3 space-y-3">
        {/* 액션 버튼 */}
        <div className="grid grid-cols-2 gap-2">
          <button onClick={handleCollect} disabled={collectLoading || !apiKey}
            className="py-3.5 rounded-xl text-sm font-bold text-white disabled:opacity-40 active:opacity-70 flex items-center justify-center gap-2"
            style={{ background: collectLoading ? '#374151' : '#0891b2' }}>
            {collectLoading
              ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spinning" />수집 중</>
              : '🔍 뉴스 수집'}
          </button>
          <button onClick={analyzeAll} disabled={analyzing || !apiKey || pendingCount === 0}
            className="py-3.5 rounded-xl text-sm font-bold text-white disabled:opacity-40 active:opacity-70 flex items-center justify-center gap-2"
            style={{ background: analyzing ? '#374151' : pendingCount === 0 ? '#374151' : '#E31937' }}>
            {analyzing
              ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spinning" />분석 중</>
              : pendingCount === 0 ? '✓ 완료' : `▶ 분석 (${pendingCount}건)`}
          </button>
        </div>

        {/* 상태 배너 */}
        {isCollected && !collectError && (
          <div className="px-3 py-2 rounded-lg flex items-center gap-2 text-xs"
            style={{ background: 'rgba(8,145,178,0.1)', border: '1px solid rgba(8,145,178,0.25)' }}>
            <span className="text-cyan-400 font-bold">🔍 실시간 수집</span>
            <span className="text-gray-500">{currentNews.length}건</span>

          <div className="px-3 py-2 rounded-lg text-xs text-red-400"

        )}
        {cachedCount > 0 && (
          <button onClick={clearCache} disabled={analyzing} className="w-full text-xs text-gray-600 py-1">

        {/* 분석 요약 카드 */}

          <div className="rounded-xl p-4" style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
