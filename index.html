                ['평균', avg != null ? (avg >= 0 ? '+' : '') + avg : '─', avg != null ? (avg >= 0 ? '#22c55e' : '#ef4444') : '#6b7280'],
                ['상승', bull, '#22c55e'],
                ['하락', bear, '#ef4444'],
                ['중립', neu,  '#9ca3af'],
              ].map(([l, v, c]) => (
                <div key={l} className="text-center py-2 rounded-lg" style={{ background: '#14171e' }}>
                  <p className="text-sm font-bold" style={{ color: c }}>{v}</p>
                  <p className="text-xs text-gray-600">{l}</p>
                </div>
              ))}
            </div>
            {done.length > 0 && (
              <div className="flex rounded-full overflow-hidden h-1.5">
                <div style={{ width: `${bull/done.length*100}%`, background: '#22c55e', transition: 'width .5s' }} />
                <div style={{ width: `${neu/done.length*100}%`,  background: '#4b5563', transition: 'width .5s' }} />
                <div style={{ width: `${bear/done.length*100}%`, background: '#ef4444', transition: 'width .5s' }} />
              </div>
            )}
          </div>
        )}

        {/* 투자 전망 요약 카드 (PC ForecastPanel 모바일 압축판) */}
        {(forecast || forecastLoading) && (
          <div className="rounded-xl border overflow-hidden" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
            <div className="px-3 py-2.5 border-b flex items-center justify-between" style={{ borderColor: '#2A2D35' }}>
              <span className="text-xs font-bold text-gray-300">📊 투자 전망 분석</span>
              <div className="flex items-center gap-1.5">
                {forecastLoading && <span className="w-3 h-3 border-2 border-blue-400 border-t-transparent rounded-full spinning" />}
                {forecast?.signal_state && SIGNAL_STATE_CFG[forecast.signal_state] && (() => {
                  const ss = SIGNAL_STATE_CFG[forecast.signal_state];
                  return <span className="text-xs font-bold px-2 py-0.5 rounded" style={{ color: ss.color, background: ss.bg, border: `1px solid ${ss.color}40` }}>{ss.emoji} {ss.label}</span>;
                })()}
                {!forecast && !forecastLoading && apiKey && (
                  <button onClick={runForecast} className="text-xs px-2 py-0.5 rounded text-blue-400" style={{ background: 'rgba(59,130,246,0.1)', border: '1px solid rgba(59,130,246,0.3)' }}>생성</button>
                )}
              </div>
            </div>
            {forecastLoading && <div className="px-3 py-4 text-center text-xs text-gray-500">전망 생성 중...</div>}
            {forecast && !forecastLoading && (
              <div className="p-3 space-y-2.5">
                {/* 종합 신호 + 리스크 */}
                <div className="flex items-center gap-2">
                  {forecast.overall_signal && (() => {
                    const sig = SIGNAL_CFG[forecast.overall_signal] || SIGNAL_CFG['관망'];
                    return <span className="text-sm font-bold px-3 py-1.5 rounded-lg" style={{ color: sig.color, background: sig.bg, border: `1px solid ${sig.color}40` }}>{sig.emoji} {forecast.overall_signal}</span>;
                  })()}
                  <span className="text-xs text-gray-500">리스크: <span className="font-semibold" style={{ color: forecast.risk_level === 'low' ? '#22c55e' : forecast.risk_level === 'very_high' ? '#ef4444' : '#f59e0b' }}>{forecast.risk_level === 'low' ? '낮음' : forecast.risk_level === 'medium' ? '보통' : forecast.risk_level === 'high' ? '높음' : '매우 높음'}</span></span>
                  {forecast.bias_check_passed !== undefined && (
                    <span className="text-xs ml-auto" style={{ color: forecast.bias_check_passed ? '#4ade80' : '#f87171' }}>
                      {forecast.bias_check_passed ? '✓편향검사' : '⚠편향주의'}
                    </span>
                  )}
                </div>
                {/* 기간별 매수지수 (1W/1M/3M) */}
                {forecast.forecasts?.length > 0 && (
                  <div className="grid grid-cols-3 gap-1.5">
                    {forecast.forecasts.slice(0,3).map(f => {
                      const col = f.buy_index >= 65 ? '#22c55e' : f.buy_index >= 45 ? '#f59e0b' : '#ef4444';
                      const sig = SIGNAL_CFG[f.signal] || SIGNAL_CFG['관망'];
                      return (
                        <div key={f.label} className="text-center p-2 rounded-lg" style={{ background: '#14171e', border: `1px solid ${sig.color}25` }}>
                          <p className="text-xs text-gray-600 mb-0.5">{f.period}</p>
                          <p className="text-lg font-black leading-none" style={{ color: col }}>{f.buy_index}</p>
                          <p className="text-xs mt-0.5 font-semibold" style={{ color: sig.color }}>{f.signal}</p>
                          <p className="text-gray-700 mt-0.5" style={{fontSize:9}}>${Math.round(f.target_low)}~${Math.round(f.target_high)}</p>
                        </div>
                      );
                    })}
                  </div>
                )}
                {/* 핵심 촉매/리스크 */}
                {(forecast.key_catalysts?.length > 0 || forecast.key_risks?.length > 0) && (
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <p className="text-xs text-green-400 font-semibold mb-1">🚀 상승 요인</p>
                      {forecast.key_catalysts?.slice(0,2).map((c,i) => <p key={i} className="text-xs text-gray-500 leading-snug">▲ {c}</p>)}
                    </div>
                    <div>
                      <p className="text-xs text-red-400 font-semibold mb-1">⚠ 하락 리스크</p>
                      {forecast.key_risks?.slice(0,2).map((r,i) => <p key={i} className="text-xs text-gray-500 leading-snug">▼ {r}</p>)}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* 뉴스 목록 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs font-semibold text-gray-600 uppercase tracking-wider">뉴스 {currentNews.length}건</p>
            {isCollected && <span className="text-xs text-cyan-500">실시간</span>}
          </div>
          <div className="space-y-2">
            {currentNews.map(news => (
              <MobileNewsCard key={news.id} news={news}
                result={results[news.id]} loading={loading[news.id]}
                error={errors[news.id]} onAnalyze={analyzeSingle} apiKey={apiKey} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 컴포넌트: CalendarPage ───────────────────────────────────────────────

function CalendarPage({ onBack, desktopMode }) {
  const isMobile = useIsMobile();
  const [events, setEvents]               = useState([]);
  const [loading, setLoading]             = useState(true);
  const [loadError, setLoadError]         = useState(false);
  const [lastUpdated, setLastUpdated]     = useState(null);
  const [currentYear, setCurrentYear]     = useState(() => new Date().getFullYear());
  const [currentMonth, setCurrentMonth]   = useState(() => new Date().getMonth());
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [activeFilter, setActiveFilter]   = useState(null);

  useEffect(() => {
    setLoading(true); setLoadError(false);
    fetch(CALENDAR_DATA_URL + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        setEvents(Array.isArray(data.events) ? data.events : []);
        setLastUpdated(data.lastUpdated || null);
        setLoading(false);
      })
      .catch(() => { setLoadError(true); setLoading(false); });
  }, []);

  const prevMonth = () => { if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); } else setCurrentMonth(m => m - 1); };
  const nextMonth = () => { if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); } else setCurrentMonth(m => m + 1); };
  const goToday   = () => { const n = new Date(); setCurrentYear(n.getFullYear()); setCurrentMonth(n.getMonth()); };

  const buildGrid = (year, month) => {
    const first = new Date(year, month, 1).getDay();
    const days  = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < first; i++) cells.push(null);
    for (let d = 1; d <= days; d++) cells.push(new Date(year, month, d));
    while (cells.length % 7 !== 0) cells.push(null);
    return cells;
  };

  const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DAY_KO   = ['일','월','화','수','목','금','토'];
  const todayStr = new Date().toISOString().split('T')[0];
  const monthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;

  const monthEvents = events.filter(ev => ev.date && ev.date.startsWith(monthStr));
  const filteredMonthEvents = activeFilter ? monthEvents.filter(e => e.category === activeFilter) : monthEvents;

  const eventsByDate = filteredMonthEvents.reduce((acc, ev) => {
    if (!acc[ev.date]) acc[ev.date] = [];
    acc[ev.date].push(ev);
    return acc;
  }, {});

  const grid = buildGrid(currentYear, currentMonth);
  const maxPills = isMobile ? 1 : 2;

  const EventPill = ({ ev, compact }) => {
    const meta = CAL_CATEGORY_META[ev.category] || CAL_CATEGORY_META['기타'];
    return (
      <button onClick={() => setSelectedEvent(ev)}
        className="w-full text-left rounded px-1 py-0.5 mb-0.5 truncate hover:opacity-80 transition-opacity"
        style={{ background: meta.bg, border: `1px solid ${meta.border}`, color: meta.color,
                 fontSize: 10, fontWeight: 600, opacity: ev.confirmed ? 1 : 0.65 }}>
        {!ev.confirmed && '? '}{meta.dot} {ev.title}
      </button>
    );
  };

  return (
    <div style={{ background: '#0D0F14', minHeight: '100vh', paddingBottom: isMobile ? 80 : 0 }}>

      {/* 모바일 헤더 (데스크탑 모드일 때는 숨김) */}
      {isMobile && !desktopMode && (
        <div className="sticky top-0 z-40 flex items-center gap-3 px-4 py-3"
          style={{ background: 'rgba(13,15,20,0.97)', borderBottom: '1px solid #2A2D35', backdropFilter: 'blur(8px)' }}>
          <button onClick={onBack} className="text-gray-400 text-sm">← 뒤로</button>
          <h1 className="text-base font-bold text-white flex-1">📅 테슬라 캘린더</h1>
          {lastUpdated && <span className="text-xs text-gray-600">{lastUpdated.slice(0,10)}</span>}
        </div>
      )}

      <div className={isMobile ? 'px-3 pt-3' : 'max-w-6xl mx-auto px-4 py-6'}>

        {/* 데스크탑 타이틀 */}
        {(!isMobile || desktopMode) && (
          <div className="flex items-start justify-between mb-5">
            <div>
              <h2 className="text-xl font-bold text-white">📅 테슬라 이벤트 캘린더</h2>
              <p className="text-xs text-gray-500 mt-0.5">
                {lastUpdated ? `마지막 업데이트: ${lastUpdated}` : '매주 월요일 KST 09:00 자동 업데이트'}
              </p>
            </div>
            {/* 카테고리 필터 (데스크탑) */}
            <div className="flex flex-wrap gap-1.5 justify-end max-w-lg">
              <button onClick={() => setActiveFilter(null)}
                className="text-xs px-2.5 py-1 rounded-lg font-semibold transition-all"
                style={!activeFilter ? { background:'#E3193715', border:'1px solid #E3193750', color:'#fff' }
                                     : { background:'#1C1F26', border:'1px solid #2A2D35', color:'#6b7280' }}>
                전체
              </button>
              {Object.entries(CAL_CATEGORY_META).map(([cat, meta]) => (
                <button key={cat} onClick={() => setActiveFilter(activeFilter === cat ? null : cat)}
                  className="text-xs px-2.5 py-1 rounded-lg font-semibold transition-all"
                  style={activeFilter === cat
                    ? { background: meta.bg, border: `1px solid ${meta.border}`, color: meta.color }
                    : { background:'#1C1F26', border:'1px solid #2A2D35', color:'#6b7280' }}>
                  {meta.dot} {cat}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* 월 네비게이션 */}
        <div className="flex items-center justify-between mb-4 rounded-xl px-4 py-3"
          style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
          <button onClick={prevMonth}
            className="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-white transition-colors text-lg"
            style={{ background: '#14171e', border: '1px solid #2A2D35' }}>‹</button>
          <div className="flex items-center gap-3">
            <span className="text-base font-bold text-white">{currentYear}년 {MONTH_KO[currentMonth]}</span>
            <button onClick={goToday}
              className="text-xs px-2.5 py-1 rounded-lg text-gray-500 hover:text-white transition-colors"
              style={{ background: '#14171e', border: '1px solid #2A2D35' }}>오늘</button>
          </div>
          <button onClick={nextMonth}
            className="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-white transition-colors text-lg"
            style={{ background: '#14171e', border: '1px solid #2A2D35' }}>›</button>
        </div>

        {/* 로딩 */}
        {loading && (
          <div className="flex items-center justify-center py-20 gap-3 text-gray-500">
            <span className="w-5 h-5 border-2 border-gray-600 border-t-gray-300 rounded-full spinning" />
            캘린더 불러오는 중...
          </div>
        )}

        {/* 에러 */}
        {!loading && loadError && (
          <div className="py-16 text-center rounded-xl border" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
            <p className="text-gray-500 text-sm">캘린더 데이터를 불러오지 못했습니다</p>
            <p className="text-gray-600 text-xs mt-1">GitHub Actions가 아직 실행되지 않았거나 네트워크 오류입니다</p>
          </div>
        )}

        {/* 달력 그리드 */}
        {!loading && !loadError && (
          <div className="rounded-xl overflow-hidden border mb-4" style={{ borderColor: '#2A2D35' }}>
            {/* 요일 헤더 */}
            <div className="grid grid-cols-7" style={{ background: '#14171e', borderBottom: '1px solid #2A2D35' }}>
              {DAY_KO.map((d, i) => (
                <div key={d} className="text-center py-2 text-xs font-semibold"
                  style={{ color: i === 0 ? '#ef4444' : i === 6 ? '#60a5fa' : '#6b7280' }}>{d}</div>
              ))}
            </div>
            {/* 날짜 셀 */}
            <div className="grid grid-cols-7" style={{ background: '#1C1F26' }}>
              {grid.map((date, idx) => {
                if (!date) return (
                  <div key={`e${idx}`} className="border-b border-r"
                    style={{ borderColor: '#2A2D35', background: '#161920', minHeight: isMobile ? 60 : 88 }} />
                );
                const ds  = date.toISOString().split('T')[0];
                const evs = eventsByDate[ds] || [];
                const isToday   = ds === todayStr;
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const isSun     = date.getDay() === 0;
                return (
                  <div key={ds} className="border-b border-r p-1 transition-colors"
                    style={{ borderColor: '#2A2D35', background: isToday ? 'rgba(227,25,55,0.06)' : '#1C1F26', minHeight: isMobile ? 60 : 88 }}>
                    {/* 날짜 숫자 */}
                    <div className="flex items-center mb-0.5">
                      <span className="text-xs font-semibold w-5 h-5 flex items-center justify-center rounded-full"
                        style={{ color: isToday ? '#fff' : isWeekend ? (isSun ? '#ef4444' : '#60a5fa') : '#9ca3af',
                                 background: isToday ? '#E31937' : 'transparent', fontSize: 11 }}>
                        {date.getDate()}
                      </span>
                    </div>
                    {/* 이벤트 pill */}
                    {evs.slice(0, maxPills).map(ev => <EventPill key={ev.id} ev={ev} />)}
                    {evs.length > maxPills && (
                      <button className="text-xs text-gray-500 hover:text-gray-300 px-1 leading-tight"
                        onClick={() => setSelectedEvent(evs[maxPills])}>
                        +{evs.length - maxPills}건
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 모바일 카테고리 필터 */}
        {isMobile && !loading && !loadError && (
          <div className="flex gap-1.5 flex-wrap mb-4">
            <button onClick={() => setActiveFilter(null)}
              className="text-xs px-3 py-1.5 rounded-full font-semibold"
              style={!activeFilter ? { background:'#E31937', color:'#fff' }
                                   : { background:'#1C1F26', border:'1px solid #2A2D35', color:'#6b7280' }}>
              전체
            </button>
            {Object.entries(CAL_CATEGORY_META).map(([cat, meta]) => (
              <button key={cat} onClick={() => setActiveFilter(activeFilter === cat ? null : cat)}
                className="text-xs px-3 py-1.5 rounded-full font-semibold"
                style={activeFilter === cat
                  ? { background: meta.bg, border: `1px solid ${meta.border}`, color: meta.color }
                  : { background:'#1C1F26', border:'1px solid #2A2D35', color:'#6b7280' }}>
                {meta.dot} {cat}
              </button>
            ))}
          </div>
        )}

        {/* 이번 달 이벤트 목록 */}
        {!loading && !loadError && filteredMonthEvents.length > 0 && (
          <div className="rounded-xl border overflow-hidden mb-4" style={{ borderColor: '#2A2D35' }}>
            <div className="px-4 py-2.5 border-b flex items-center justify-between"
              style={{ background: '#14171e', borderColor: '#2A2D35' }}>
              <span className="text-xs font-bold tracking-wider text-gray-300">
                {MONTH_KO[currentMonth]} 이벤트 ({filteredMonthEvents.length}건)
              </span>
              {lastUpdated && <span className="text-xs text-gray-600">업데이트 {lastUpdated.slice(0,10)}</span>}
            </div>
            <div style={{ divideColor: '#2A2D35' }}>
              {filteredMonthEvents.sort((a,b) => a.date.localeCompare(b.date)).map(ev => {
                const meta = CAL_CATEGORY_META[ev.category] || CAL_CATEGORY_META['기타'];
                return (
                  <button key={ev.id} onClick={() => setSelectedEvent(ev)}
                    className="w-full text-left px-4 py-3 flex items-start gap-3 hover:opacity-80 transition-opacity border-b"
                    style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
                    <div className="w-10 h-10 rounded-lg flex flex-col items-center justify-center shrink-0"
                      style={{ background: meta.bg, border: `1px solid ${meta.border}` }}>
                      <span style={{ fontSize: 15 }}>{meta.dot}</span>
                      <span className="font-bold" style={{ color: meta.color, fontSize: 9 }}>{ev.date.slice(8)}일</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-sm font-semibold text-gray-100 truncate">{ev.title}</span>
                        {!ev.confirmed && <span className="text-xs text-yellow-500 shrink-0">미확정</span>}
                        {ev.importance === 'high' && (
                          <span className="text-xs px-1.5 py-0.5 rounded font-bold shrink-0"
                            style={{ background: meta.bg, color: meta.color, border: `1px solid ${meta.border}` }}>중요</span>
                        )}
                      </div>
                      <p className="text-xs text-gray-500 mt-0.5">
                        {ev.date}{ev.time ? ` · ${ev.time} ${ev.timezone || ''}` : ''} · {ev.category} · {ev.source}
                      </p>
                      {ev.description && <p className="text-xs text-gray-400 mt-1 leading-relaxed line-clamp-2">{ev.description}</p>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* 빈 상태 */}
        {!loading && !loadError && filteredMonthEvents.length === 0 && (
          <div className="py-14 text-center rounded-xl border" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
            <p className="text-2xl mb-2">📭</p>
            <p className="text-gray-500 text-sm">이번 달 등록된 이벤트가 없습니다</p>
            <p className="text-gray-600 text-xs mt-1">매주 월요일 KST 09:00 자동 업데이트됩니다</p>
          </div>
        )}
      </div>

      {/* 이벤트 상세 모달 */}
      {selectedEvent && (() => {
        const meta = CAL_CATEGORY_META[selectedEvent.category] || CAL_CATEGORY_META['기타'];
        return (
          <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-4"
            style={{ background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(4px)' }}
            onClick={() => setSelectedEvent(null)}>
            <div className="w-full max-w-md rounded-2xl p-5 relative"
              style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}
              onClick={e => e.stopPropagation()}>
              <div className="flex items-start gap-3 mb-4">
                <div className="w-12 h-12 rounded-xl flex items-center justify-center shrink-0 text-xl"
                  style={{ background: meta.bg, border: `1px solid ${meta.border}` }}>
                  {meta.dot}
                </div>
                <div className="flex-1">
                  <h3 className="text-base font-bold text-white leading-snug">{selectedEvent.title}</h3>
                  {selectedEvent.titleEn && <p className="text-xs text-gray-500 mt-0.5">{selectedEvent.titleEn}</p>}
                </div>
                <button onClick={() => setSelectedEvent(null)} className="text-gray-600 hover:text-white text-lg leading-none">✕</button>
              </div>
              <div className="space-y-2.5 text-sm">
                {[
                  ['📅 날짜', `${selectedEvent.date}${selectedEvent.time ? ` ${selectedEvent.time} ${selectedEvent.timezone||''}` : ''}`],
                  ['🏷 분류', selectedEvent.category],
                  ['✅ 확정', selectedEvent.confirmed ? '공식 확정' : '⚠ 미확정 (추정)'],
                  selectedEvent.description && ['📝 설명', selectedEvent.description],
                  ['🔗 출처', selectedEvent.source],
                ].filter(Boolean).map(([label, value]) => (
                  <div key={label} className="flex gap-3">
                    <span className="text-gray-600 shrink-0 w-16 text-xs">{label}</span>
                    <span className="text-gray-300 text-xs leading-relaxed"
                      style={label === '🏷 분류' ? { color: meta.color } : label.includes('확정') && selectedEvent.confirmed ? { color: '#22c55e' } : label.includes('확정') ? { color: '#f59e0b' } : {}}>
                      {value}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── 컴포넌트: Section (접기/펼치기 래퍼) ────────────────────────────────────
function Section({ title, icon, badge, accent, defaultOpen = true, extra, children }) {
  const [open, setOpen] = useState(defaultOpen);
  const bc = accent ? `${accent}50` : '#2A2D35';
  const ic = accent || '#6b7280';
  return (
    <div className="mb-5">
      {/* 섹션 헤더 토글 바 */}
      <div className="flex items-center px-4 py-2.5 rounded-xl mb-2 cursor-pointer select-none"
        style={{ background: '#1C1F26', border: `1px solid ${bc}` }}
        onClick={() => setOpen(v => !v)}>
        <span className="text-sm mr-2" style={{ opacity: open ? 1 : 0.5 }}>{icon}</span>
        <span className="text-sm font-bold text-gray-200 flex-1">{title}</span>
        {badge != null && (
          <span className="text-xs px-2 py-0.5 rounded-full mr-2 font-semibold"
            style={{ background: `${ic}15`, color: ic, border: `1px solid ${ic}30` }}>
            {badge}
          </span>
        )}
        {extra && (
          <div className="mr-2" onClick={e => e.stopPropagation()}>{extra}</div>
        )}
        <span className="text-gray-600 text-xs ml-1"
          style={{ transform: open ? 'rotate(180deg)' : 'none', display: 'inline-block', transition: 'transform .2s' }}>
          ▼
        </span>
      </div>
      {/* 섹션 내용 */}
      {open && children}
    </div>
  );
}

// ─── 컴포넌트: TrendPage ──────────────────────────────────────────────────

function TrendPage({ onBack, onPullFromDrive, onPushToDrive, driveSyncing, driveConnected, driveLastSync, driveError,
  forecast, forecastLoading, forecastError, onRetryForecast,
  weeklyData, weeklyLoading, weeklyError, currentPrice, priceLastFetch, priceFromCache, priceReady,
  newsItems, newsResults, calendarEvents }) {
  const [db, setDB] = useState(() => getNewsDB());
  const [expanded, setExpanded] = useState(null);
  const [autoSessions, setAutoSessions] = useState([]);
  const [autoLoading, setAutoLoading] = useState(true);
  const [autoLastSync, setAutoLastSync] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [checkedIds, setCheckedIds] = useState(new Set());

  const refresh = () => setDB(getNewsDB());

  const toggleEditMode = () => { setEditMode(v => !v); setCheckedIds(new Set()); setExpanded(null); };
  const toggleCheck = (id, e) => { e.stopPropagation(); setCheckedIds(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; }); };
  const toggleAll = () => {
    const allIds = autoSessions.map(s => s.id);
    const allChecked = allIds.every(id => checkedIds.has(id));
    setCheckedIds(allChecked ? new Set() : new Set(allIds));
  };
  const deleteSelected = () => {
    if (checkedIds.size === 0) return;
    const cur = getNewsDB();
    cur.sessions = (cur.sessions || []).filter(s => !checkedIds.has(s.id));
    saveNewsDB(cur);
    setCheckedIds(new Set());
    setEditMode(false);
    refresh();
  };

  // 자동 세션 불러오기
  useEffect(() => {
    setAutoLoading(true);
    fetchAutoSessions().then(arr => {
      setAutoSessions(arr);
      setAutoLastSync(arr[0]?.kstTime ? `${arr[0].date} ${arr[0].kstTime} KST` : null);
      setAutoLoading(false);
    });
  }, []);

  // Drive에서 불러온 후 로컬 갱신
  const handlePull = async () => { await onPullFromDrive?.(); refresh(); };

  const localSessions = db.sessions || [];
  const sessions = autoSessions.slice().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  const valid = sessions.filter(s => s.buyIndex != null || s.avgScore != null);
  const latest = valid[0]?.buyIndex ?? null;
  const avg = valid.length ? Math.round(valid.reduce((s, x) => s + (x.buyIndex ?? 50), 0) / valid.length) : null;
  const trend = valid.length >= 2 ? ((valid[0]?.buyIndex ?? 50) > (valid[1]?.buyIndex ?? 50) ? '↑ 상승' : '↓ 하락') : '─';
  const trendCol = trend.startsWith('↑') ? '#22c55e' : trend.startsWith('↓') ? '#ef4444' : '#6b7280';
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';
  const clearDB = () => { if (confirm('모든 수집 기록을 삭제할까요?')) { saveNewsDB({ sessions: [] }); refresh(); } };

  // ─── 등급 정의 ──────────────────────────────────────────────────────────
  const GRADES = [
    { min: 81, max: 100, grade: 'S', label: '적극매수', color: '#22c55e', bg: 'rgba(34,197,94,0.12)',  desc: '강력한 매수 신호. 다수 호재 집중, 모멘텀 최상' },
    { min: 61, max: 80,  grade: 'A', label: '매수',    color: '#86efac', bg: 'rgba(134,239,172,0.1)', desc: '우호적 환경. 단기 상승 가능성 높음' },
    { min: 45, max: 60,  grade: 'B', label: '관망',    color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', desc: '방향성 불명확. 추가 뉴스 모니터링 권장' },
    { min: 25, max: 44,  grade: 'C', label: '매도',    color: '#f97316', bg: 'rgba(249,115,22,0.12)', desc: '부정적 신호 우세. 비중 축소 고려' },
    { min: 0,  max: 24,  grade: 'D', label: '적극매도', color: '#ef4444', bg: 'rgba(239,68,68,0.15)',  desc: '다수 악재 집중. 강한 하락 압력' },
  ];
  const getGrade = v => GRADES.find(g => v >= g.min && v <= g.max) || GRADES[2];

  // ─── 7일 예측 (선형 회귀) ───────────────────────────────────────────────
  const predict7Days = () => {
    if (valid.length === 0) return [];
    const basePts = [...valid].reverse().slice(-8).map((s, i) => ({ x: i, y: s.buyIndex ?? 50 }));
    const n = basePts.length;
    const confidence = valid.length >= 5 ? 'high' : valid.length >= 3 ? 'medium' : 'low';
    const confLabel = confidence === 'high' ? '높음' : confidence === 'medium' ? '보통' : '낮음';
    const confColor = confidence === 'high' ? '#22c55e' : confidence === 'medium' ? '#f59e0b' : '#6b7280';
    if (n < 2) {
      const v = basePts[0]?.y ?? 50;
      return Array.from({ length: 7 }, (_, i) => ({ value: v, day: i + 1, confidence, confLabel, confColor, slope: 0 }));
    }
    const sx = basePts.reduce((s, p) => s + p.x, 0), sy = basePts.reduce((s, p) => s + p.y, 0);
    const sxy = basePts.reduce((s, p) => s + p.x * p.y, 0), sx2 = basePts.reduce((s, p) => s + p.x * p.x, 0);
    const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx || 1);
    const intercept = (sy - slope * sx) / n;
    return Array.from({ length: 7 }, (_, i) => {
      const raw = intercept + slope * (n + i);
      // 날짜 계산
      const d = new Date(); d.setDate(d.getDate() + i + 1);
      const dateLabel = `${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return {
        value: Math.min(100, Math.max(0, Math.round(raw))),
        day: i + 1, dateLabel, confidence, confLabel, confColor,
        slope: Math.round(slope * 10) / 10,
      };
    });
  };
  const prediction7 = predict7Days();
  const prediction = prediction7[0] ?? null;
  return (
    <div className="max-w-6xl mx-auto px-3 py-4 md:px-4 md:py-6">
      {/* Header */}
      <div className="mb-4 md:mb-6">
        {/* 타이틀 행 */}
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2">
            <button onClick={onBack} className="text-xs px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white transition-colors shrink-0" style={{ background: '#252830', border: '1px solid #2A2D35' }}>← 뒤로</button>
            <div>
              <h1 className="text-base md:text-xl font-bold text-white tracking-tight leading-tight">TSLA 매수지수 트렌드</h1>
              <p className="text-xs text-gray-600 leading-tight hidden md:block">
                종합 수집 타임라인 DB · 이력 분석
              </p>
            </div>
          </div>
          {/* 자동분석 상태 + 버튼 (오른쪽) */}
          <div className="flex items-center gap-1.5 shrink-0">
            <span className="text-xs hidden sm:inline" style={{ color: autoLoading ? '#60a5fa' : autoLastSync ? '#22c55e' : '#6b7280' }}>
              {autoLoading ? '🤖 로딩 중…' : autoLastSync ? `🤖 ${autoLastSync}` : ''}
            </span>
            <button onClick={refresh} className="text-xs px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white" style={{ background: '#252830', border: '1px solid #2A2D35' }}>↻</button>
            {sessions.length > 0 && <button onClick={clearDB} className="text-xs px-2.5 py-1.5 rounded-lg text-red-400" style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.2)' }}>🗑</button>}
          </div>
        </div>
        {/* Drive 버튼 행 — PC만 */}
        {driveConnected && (
          <div className="hidden md:flex gap-2 items-center">
            <button onClick={handlePull} disabled={driveSyncing}
              className="text-xs px-3 py-1.5 rounded-lg font-semibold text-white hover:opacity-90 disabled:opacity-40"
              style={{ background: '#1d4ed8' }}>
              {driveSyncing ? '⏳ 동기화 중…' : '⬇ Drive 불러오기'}
            </button>
            <button onClick={onPushToDrive} disabled={driveSyncing}
              className="text-xs px-3 py-1.5 rounded-lg font-semibold text-white hover:opacity-90 disabled:opacity-40"
              style={{ background: '#7c3aed' }}>⬆ Drive 저장</button>
            {driveLastSync && <span className="text-xs text-gray-600">동기화: {driveLastSync}</span>}
          </div>
        )}
      </div>

      {/* ── Section 1: 지수 현황 ─────────────────────────────────────────── */}
      <Section title="지수 현황" icon="📊" badge={latest != null ? `매수지수 ${latest}` : null} accent={latest != null ? bCol(latest) : null} defaultOpen={true}>

      {/* Stats — 통합 프레임 */}
      <div className="rounded-xl mb-4 md:mb-5" style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
        <div className="grid grid-cols-3 divide-x" style={{ borderColor: '#2A2D35' }}>
          {[
            ['최근 매수지수', latest ?? '─', latest ? bCol(latest) : '#6b7280'],
            ['평균 매수지수', avg    ?? '─', avg    ? bCol(avg)    : '#6b7280'],
            ['추세',          trend,          trendCol],
          ].map(([label, val, col], i) => (
            <div key={label} className="flex flex-col items-center justify-center py-4 px-3 gap-1">
              <p className="text-xs text-gray-500">{label}</p>
              <p className="text-xl md:text-2xl font-bold leading-none" style={{ color: col }}>{val}</p>
              {i === 0 && latest != null && (
                <span className="text-xs font-bold px-1.5 py-0.5 rounded mt-0.5"
                  style={{ background: getGrade(latest).bg, color: getGrade(latest).color }}>
                  {getGrade(latest).grade}등급
                </span>
              )}
            </div>
          ))}
        </div>
      </div>
      {/* 뉴스 브리핑 + 오늘 평가/내일 예측 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">

        {/* 오늘의 뉴스 브리핑 */}
        <div className="rounded-xl border p-4 flex flex-col" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">📰 오늘의 뉴스 브리핑</p>
          {valid.length === 0 ? (
            <div className="flex flex-col items-center justify-center flex-1 text-gray-600 min-h-32">
              <p className="text-2xl mb-2">📭</p>
              <p className="text-xs">분석 데이터 없음</p>
            </div>
          ) : (() => {
            const s = valid[0];
            const news = s.news || [];
            const analyses = s.analyses || {};
            const analyzed = news
              .filter(n => analyses[n.id])
              .map(n => ({ ...n, ...analyses[n.id] }))
              .sort((a, b) => Math.abs(b.impact_score) - Math.abs(a.impact_score));
            const topNews = analyzed.slice(0, 3);
            const bull = s.bullish || 0;
            const bear = s.bearish || 0;
            const neu = typeof s.neutral === 'number' ? s.neutral : (analyzed.length - bull - bear);
            const dominantDir = bull > bear ? '강세' : bear > bull ? '약세' : '중립';
            const dirEmoji = bull > bear ? '📈' : bear > bull ? '📉' : '➡';
            const dirColor = bull > bear ? '#22c55e' : bear > bull ? '#ef4444' : '#f59e0b';
            const topRules = (s.topRules || []).slice(0, 3);
            // 카테고리 집계
            const cats = {};
            analyzed.forEach(n => { if (n.category) cats[n.category] = (cats[n.category] || 0) + 1; });
            const topCats = Object.entries(cats).sort((a,b) => b[1]-a[1]).slice(0, 3).map(([c]) => c);
            // 코멘트 생성
            const ruleText = topRules.length ? ` 주요 트리거 룰: ${topRules.join(', ')}.` : '';
            const topTitle = topNews[0] ? topNews[0].title : '';
            const comment = `${s.date} 기준 ${s.analyzedCount || analyzed.length}건 뉴스 분석 — ${dirEmoji} ${dominantDir} 우세 (강세 ${bull} · 약세 ${bear} · 중립 ${neu}건).${ruleText}${topTitle ? ` 가장 주목할 이슈는 "${topTitle.length > 45 ? topTitle.slice(0,45)+'…' : topTitle}"입니다.` : ''}`;
            // 카테고리 파이프 분리 후 개별 배지로 표시
            const catBadges = [...new Set(
              analyzed.flatMap(n => (n.category || '').split('|').map(c => c.trim())).filter(Boolean)
            )].slice(0, 5);

            return (
              <div className="flex flex-col gap-2.5 flex-1">

                {/* ① 방향 + 강세/약세/중립 수 — 한 줄 */}
                <div className="flex items-center justify-between">
                  <span className="text-sm font-black px-2.5 py-1 rounded-lg"
                    style={{ color: dirColor, background: `${dirColor}18`, border: `1px solid ${dirColor}35` }}>
                    {dirEmoji} {dominantDir} 우세
                  </span>
                  <div className="flex gap-2 text-xs">
                    <span style={{ color: '#22c55e' }}>📈 {bull}</span>
                    <span style={{ color: '#ef4444' }}>📉 {bear}</span>
                    <span style={{ color: '#6b7280' }}>➡ {neu}</span>
                  </div>
                </div>

                {/* ② 카테고리 태그 — 개별 배지 */}
                <div className="flex flex-wrap gap-1">
                  {catBadges.map(c => (
                    <span key={c} className="text-xs px-1.5 py-0.5 rounded-md font-medium"
                      style={{ background: '#252830', color: '#9ca3af', border: '1px solid #2A2D35' }}>{c}</span>
                  ))}
                </div>

                {/* ③ 코멘트 — 날짜/건수 헤더 + 본문 분리 */}
                <div className="rounded-lg overflow-hidden" style={{ border: '1px solid #2a2d35' }}>
                  <div className="px-2.5 py-1.5 flex items-center justify-between"
                    style={{ background: '#0d0f14', borderBottom: '1px solid #2a2d35' }}>
                    <span className="text-xs text-gray-600">{s.date} · {s.analyzedCount || analyzed.length}건 분석</span>
                    <span className="text-xs text-gray-600">{topRules.length ? topRules.join(' · ') : ''}</span>
                  </div>
                  <div className="px-2.5 py-2" style={{ background: '#14171e' }}>
                    <p className="text-xs text-gray-300 leading-relaxed">
                      {topTitle
                        ? `"${topTitle.length > 40 ? topTitle.slice(0,40)+'…' : topTitle}"${ruleText ? ' — ' + ruleText : ''}`
                        : ruleText || '분석 내용 없음'}
                    </p>
                  </div>
                </div>

                {/* ④ 상위 뉴스 3건 */}
                <div className="space-y-1.5 flex-1">
                  {topNews.map(n => {
                    const sc = n.impact_score;
                    const col = sc >= 0 ? '#22c55e' : '#ef4444';
                    return (
                      <div key={n.id} className="flex items-center gap-2 px-2.5 py-2 rounded-lg"
                        style={{ background: '#14171e', border: `1px solid ${col}20` }}>
                        <span className="text-xs font-black shrink-0 w-6 text-center tabular-nums"
                          style={{ color: col }}>{sc >= 0 ? '+' : ''}{sc}</span>
                        <p className="text-xs text-gray-300 leading-snug flex-1 min-w-0 truncate">{n.title}</p>
                      </div>
                    );
                  })}
                </div>

                {/* ⑤ 푸터 */}
                <div className="flex items-center justify-between pt-0.5">
                  <span className="text-xs text-gray-700">
                    {s.source === 'auto' ? '🤖 자동 수집' : s.source === 'collected' ? '🔍 실시간 수집' : '📋 샘플'}
                  </span>
                  <span className="text-xs text-gray-700">{s.kstTime ? s.kstTime + ' KST' : s.date}</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* 오늘의 평가 + 내일 예측 (통합) */}
        <div className="rounded-xl border p-4" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
          {latest == null && prediction == null ? (
            <div className="flex flex-col items-center justify-center h-40 text-gray-600">
              <p className="text-3xl mb-2">📭</p>
              <p className="text-xs">분석 데이터 없음</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-0 divide-x" style={{ borderColor: '#2A2D35' }}>
              {/* 오늘의 평가 (v4.0) */}
              <div className="pr-4 flex flex-col gap-2.5">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">📅 오늘의 평가</p>
                {latest == null ? (
                  <div className="flex items-center justify-center h-24 text-gray-600 text-xs">데이터 없음</div>
                ) : (() => {
                  const g = getGrade(latest);
                  const todaySession = valid[0];
                  const vsAvg = avg != null ? latest - avg : null;
                  // v4.0: 신호 상태 계산
                  const mCtx = todaySession?.macroCtx;
                  const rsi  = mCtx?.rsi ?? null;
                  const vix  = mCtx?.vixClose ?? null;
                  const macdInfo = mCtx?.macd;
                  const bbInfo   = mCtx?.bb;
                  const sState   = todaySession?.analysis?.signalState || (latest >= 75 && rsi > 75 ? 'cautionary_bull' : latest >= 75 ? 'strong_bull' : latest >= 57 ? 'bull' : latest <= 32 ? 'strong_bear' : latest <= 43 ? 'bear' : 'neutral');
                  const ss = SIGNAL_STATE_CFG[sState] || SIGNAL_STATE_CFG['neutral'];
                  return (
                    <>
                      <div className="flex items-center gap-2.5">
                        <div className="flex flex-col items-center justify-center w-14 h-14 rounded-xl shrink-0"
                          style={{ background: g.bg, border: `2px solid ${g.color}` }}>
                          <span className="text-xl font-black" style={{ color: g.color }}>{g.grade}</span>
                        </div>
                        <div>
                          <p className="text-2xl font-black leading-none" style={{ color: g.color }}>{latest}</p>
                          <p className="text-xs font-bold mt-0.5" style={{ color: g.color }}>{g.label}</p>
                          <p className="text-xs text-gray-600 mt-0.5">{todaySession?.date}</p>
                        </div>
                      </div>
                      {/* v4.0 신호 상태 배지 */}
                      <div className="flex flex-wrap gap-1.5">
                        <span className="text-xs font-bold px-2 py-0.5 rounded" style={{ color: ss.color, background: ss.bg, border: `1px solid ${ss.color}40` }}
                          title={ss.desc}>
                          {ss.emoji} {ss.label}
                        </span>
                        {vsAvg != null && (
                          <span className="text-xs px-2 py-0.5 rounded" style={{ background: '#252830', color: vsAvg >= 0 ? '#22c55e' : '#ef4444' }}>
                            평균대비 {vsAvg >= 0 ? '+' : ''}{vsAvg}p
                          </span>
                        )}
                      </div>
                      {/* 기술적 지표 요약 */}
                      {(rsi || vix || macdInfo || bbInfo) && (
                        <div className="grid grid-cols-2 gap-1 text-xs">
                          {rsi && <div className="px-1.5 py-1 rounded text-center" style={{ background: '#14171e' }}>
                            <p className="text-gray-600" style={{fontSize:9}}>RSI</p>
                            <p className="font-bold" style={{ color: rsi < 30 ? '#22c55e' : rsi > 75 ? '#f97316' : '#94a3b8' }}>{rsi}</p>
                          </div>}
                          {vix && <div className="px-1.5 py-1 rounded text-center" style={{ background: '#14171e' }}>
                            <p className="text-gray-600" style={{fontSize:9}}>VIX</p>
                            <p className="font-bold" style={{ color: vix > 30 ? '#ef4444' : vix > 20 ? '#f59e0b' : '#22c55e' }}>{Math.round(vix)}</p>
                          </div>}
                          {macdInfo && <div className="px-1.5 py-1 rounded text-center" style={{ background: '#14171e' }}>

// ─── 백테스트 페이지 ───────────────────────────────────────────────────────

function BacktestPage({ apiKey }) {
  const [savedData,      setSavedData]      = React.useState(() => loadBacktest());
  const [results,        setResults]        = React.useState(() => loadBacktest()?.results || []);
  const [staticData,     setStaticData]     = React.useState(null);   // GitHub repo JSON
  const [staticLoading,  setStaticLoading]  = React.useState(true);
  const [btPrices,       setBtPrices]       = React.useState(null);
  const [pricesLoading,  setPricesLoading]  = React.useState(false);
  const [running,        setRunning]        = React.useState(false);
  const stopRef                             = React.useRef(false);
  const [progress,       setProgress]       = React.useState({ current: 0, total: 0, phase: '', week: '' });
  const [selectedRange,  setSelectedRange]  = React.useState('all');
  const [expandedWeek,   setExpandedWeek]   = React.useState(null);
  const [activeTab,      setActiveTab]      = React.useState('results');
  const [btError,        setBtError]        = React.useState(null);

  // ── GitHub repo 정적 결과 파일 로드 ──
  React.useEffect(() => {
    setStaticLoading(true);
    fetch(BACKTEST_RESULTS_URL + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.weeks?.length) {
          setStaticData(data);
          // GitHub이 항상 소스 오브 트루스 — 재채점/업데이트 반영을 위해 항상 덮어쓰기
          setResults(data.weeks);
          setSavedData({ results: data.weeks, savedAt: Date.now(), fromStatic: true });
          saveBacktest({ results: data.weeks, savedAt: Date.now(), fromStatic: true });
        }
      })
      .catch(() => {})
      .finally(() => setStaticLoading(false));
  }, []);

  const RANGE_LABELS = {
    q1:  'Q1 (1~3월)',
    q2:  'Q2 (4~6월)',
    q3:  'Q3 (7~9월)',
    q4:  'Q4 (10~12월)',
    all: '전체 2025년',
  };

  function get2025Weeks(range) {
    const map = {
      q1:  { start: '2025-01-06', end: '2025-03-31' },
      q2:  { start: '2025-04-07', end: '2025-06-30' },
      q3:  { start: '2025-07-07', end: '2025-09-29' },
      q4:  { start: '2025-10-06', end: '2025-12-29' },
      all: { start: '2025-01-06', end: '2025-12-29' },
    };
    const { start, end } = map[range];
    const weeks = [];
    let d = new Date(start + 'T00:00:00Z');
    const endDate = new Date(end + 'T00:00:00Z');
    while (d <= endDate) {
      const ws = d.toISOString().split('T')[0];
      const we = new Date(d.getTime() + 6 * 86400000).toISOString().split('T')[0];
      weeks.push({ weekStart: ws, weekEnd: we });
      d = new Date(d.getTime() + 7 * 86400000);
    }
    return weeks;
  }

  function getActualMovement(weekStart, prices) {
    const src = prices || btPrices;
    if (!src) return null;
    const wDate = new Date(weekStart + 'T00:00:00Z');
    let closest = null, minDiff = Infinity;
    for (const p of src) {
      const diff = Math.abs(p.date.getTime() - wDate.getTime());
      if (diff < minDiff) { minDiff = diff; closest = p; }
    }
    if (!closest || minDiff > 8 * 86400000) return null;
    const pct = (closest.close - closest.open) / closest.open * 100;
    const actual = pct > 1.5 ? 'bullish' : pct < -1.5 ? 'bearish' : 'neutral';
    return { pctChange: Math.round(pct * 100) / 100, actual, open: closest.open, close: closest.close };
  }

  // 주가 2년 주봉 로드
  React.useEffect(() => {
    setPricesLoading(true);
    fetchTSLA2YearWeekly()
      .then(items => setBtPrices(items))
      .catch(e => setBtError('주가 데이터 로드 실패: ' + e.message))
      .finally(() => setPricesLoading(false));
  }, []);

  async function runBacktest() {
    if (!apiKey) { alert('API 키를 먼저 설정해주세요.'); return; }
    if (!btPrices) { alert('주가 데이터를 불러오는 중입니다. 잠시 후 시도해주세요.'); return; }
    setRunning(true); stopRef.current = false; setBtError(null);
    setProgress({ current: 0, total: 0, phase: '매크로 데이터 로드 중', week: '' });
    // 매크로 데이터 로드 (SPY/QQQ/VIX/TSLA) — 한 번만
    const macroData = await loadMacroDataBrowser();
    const weeks = get2025Weeks(selectedRange);
    setProgress({ current: 0, total: weeks.length, phase: '초기화', week: '' });
    const newResults = [];
    for (let i = 0; i < weeks.length; i++) {
      if (stopRef.current) break;
      const { weekStart, weekEnd } = weeks[i];
      setProgress({ current: i + 1, total: weeks.length, phase: '뉴스 수집', week: weekStart });
      try {
        const news = await collectHistoricalWeekNews(apiKey, weekStart, weekEnd);
        setProgress({ current: i + 1, total: weeks.length, phase: 'AI 분석', week: weekStart });
        const macroCtx = buildMacroCtxBrowser(macroData, weekStart);
        const analysis = await analyzeWeekBatch(apiKey, news, macroCtx);
        const movement = getActualMovement(weekStart, btPrices);
        const match    = (analysis && movement) ? (analysis.direction === movement.actual) : null;
        const strong   = analysis ? Math.abs(analysis.buyIndex - 50) > 20 : false;
        newResults.push({ weekStart, weekEnd, news: news.map(n => ({ title: n.title, source: n.source, category: n.category })), newsCount: news.length, analysis, movement, match, strongSignal: strong });
      } catch (e) {
        const movement = getActualMovement(weekStart, btPrices);
        newResults.push({ weekStart, weekEnd, newsCount: 0, analysis: null, movement, match: null, strongSignal: false, error: e.message });
      }
      setResults([...newResults]);
      saveBacktest({ results: newResults, range: selectedRange });
      setSavedData({ results: newResults, range: selectedRange, savedAt: Date.now() });
      if (i < weeks.length - 1) await new Promise(r => setTimeout(r, 1500));
    }
    setRunning(false);
    setProgress(p => ({ ...p, phase: '완료' }));
  }

  // ── 범위 필터링 ──
  const QUARTER_RANGES = {
    q1: { start: '2025-01-01', end: '2025-03-31' },
    q2: { start: '2025-04-01', end: '2025-06-30' },
    q3: { start: '2025-07-01', end: '2025-09-30' },
    q4: { start: '2025-10-01', end: '2025-12-31' },
    all: { start: '2025-01-01', end: '2025-12-31' },
  };
  const qRange = QUARTER_RANGES[selectedRange];
  const filteredResults = results.filter(r => r.weekStart >= qRange.start && r.weekStart <= qRange.end);

  // ── 통계 계산 ──
  const analyzed    = filteredResults.filter(r => r.analysis && r.movement);
  const matched     = analyzed.filter(r => r.match).length;
  const accuracy    = analyzed.length ? Math.round(matched / analyzed.length * 100) : 0;
  const strong      = analyzed.filter(r => r.strongSignal);
  const strongAcc   = strong.length ? Math.round(strong.filter(r => r.match).length / strong.length * 100) : 0;
  const avgScoreAll = analyzed.length ? Math.round(analyzed.reduce((s, r) => s + (r.analysis?.avgScore || 0), 0) / analyzed.length * 10) / 10 : 0;
  // 의미있는 움직임만 평가 (±2% 이상) — 노이즈 제외 평가지표
  const significant = analyzed.filter(r => Math.abs(r.movement?.pctChange || 0) >= 2);
  const sigMatched  = significant.filter(r => r.match).length;
  const sigAcc      = significant.length ? Math.round(sigMatched / significant.length * 100) : 0;
  // 모델 버전 (v2.0이면 매크로 강화 모델 적용됨)
  const modelV2     = analyzed.some(r => r.analysis?.modelVersion === '2.0');

  // 상위 룰
  const ruleCntAll = {};
  filteredResults.forEach(r => (r.analysis?.topRules || []).forEach(rule => { ruleCntAll[rule] = (ruleCntAll[rule] || 0) + 1; }));
  const topRulesAll = Object.entries(ruleCntAll).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // 룰 설명 맵
  const RULE_LABELS = {
    R01:'인도량 미달(>5%)', R02:'EPS 미달(>10%)', R03:'가이던스 하향', R04:'리콜(>50K)',
    R05:'SEC/DOJ 조사', R06:'경쟁사 EV 출시', R07:'공장 폐쇄/화재', R08:'머스크 SNS 논란',
    R09:'보조금 축소', R10:'가격 인하(>5%)', R11:'인도량 초과(>5%)', R12:'EPS 초과(>10%)',
    R13:'신제품/FSD 마일스톤', R14:'EV 인센티브 확대', R15:'대형 에너지 계약', R16:'신시장 진출',
    R17:'목표가 상향(>20%)', R18:'연준 금리 인하 신호', R19:'머스크 자사주매입/호재', R20:'중국 판매 성장',
    R21:'주요 소송 승리', R22:'공매도 리포트', R23:'경기침체 우려', R24:'머스크 사업 리스크',
  };

  return (
    <div style={{ padding: '16px 16px 40px', maxWidth: 920, margin: '0 auto' }}>
      {/* 헤더 */}
      <div className="mb-5">

                <span className="text-center">매수지수</span>

              </div>
              {filteredResults.map((row, idx) => {
                const isOpen  = expandedWeek === row.weekStart;
                const bi      = row.analysis?.buyIndex;
                const biColor = bi == null ? '#6b7280' : bi >= 70 ? '#22c55e' : bi >= 50 ? '#86efac' : bi >= 30 ? '#f97316' : '#ef4444';
                const mv      = row.movement;
                const mvColor = !mv ? '#6b7280' : mv.pctChange > 0 ? '#22c55e' : mv.pctChange < 0 ? '#ef4444' : '#9ca3af';
                const mvArrow = !mv ? '—' : mv.actual === 'bullish' ? '▲' : mv.actual === 'bearish' ? '▼' : '→';
                const dirLabel = row.analysis

                  <div key={row.weekStart} style={{ borderBottom: idx < filteredResults.length - 1 ? '1px solid #1a1d24' : 'none' }}>

                      <span className="text-xs text-gray-300 font-mono">{row.weekStart}</span>

                      <span className="text-center">
                        {bi != null

                      <span className="text-center">
                        {mv
                          ? <span className="text-xs font-mono" style={{ color: mvColor }}>
                              {mvArrow} {mv.pctChange > 0 ? '+' : ''}{mv.pctChange}%
                            </span>

                      </span>
                      <span className="text-center text-xs" style={{ color: row.analysis?.direction === 'bullish' ? '#22c55e' : row.analysis?.direction === 'bearish' ? '#ef4444' : '#9ca3af' }}>
                        {dirLabel}

                      <span className="text-center text-base leading-none">
                        {row.match === true ? '✅' : row.match === false ? '❌' : row.error ? '⚠' : '—'}

                    </button>
                    {isOpen && (
                      <div className="px-4 pb-3 border-t" style={{ borderColor: '#2A2D35', background: '#0f1117' }}>

                            <span>강한신호: <span style={{ color: row.strongSignal ? '#f59e0b' : '#6b7280' }}>{row.strongSignal ? '✓ 예' : '아니오'}</span></span>
                            <span>룰: <span className="text-white">{(row.analysis.topRules || []).join(', ') || '없음'}</span></span>
                            {mv && <span>주가: <span className="text-white font-mono">${mv.open?.toFixed(1)} → ${mv.close?.toFixed(1)}</span></span>}
                          </div>

                        {row.news?.length > 0 && (
                          <div className="mt-1.5 space-y-1">
                            {row.news.map((n, i) => (

                              </div>

                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── 인사이트 탭 ── */}
          {activeTab === 'insights' && (
            <div className="space-y-4">

              <div className="rounded-xl p-4 border" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
                <h3 className="text-sm font-bold text-white mb-3">📊 예측 정확도 분석</h3>
                <div className="space-y-2 text-sm text-gray-400">
                  <p>• 전체 방향 정확도:
                    <span className="font-bold ml-1" style={{ color: accuracy >= 60 ? '#22c55e' : accuracy >= 50 ? '#f59e0b' : '#ef4444' }}>{accuracy}%</span>
                    <span className="text-xs ml-2">{accuracy >= 65 ? '— 우수한 예측력입니다.' : accuracy >= 55 ? '— 신뢰 가능한 수준입니다.' : accuracy >= 45 ? '— 소폭 개선이 필요합니다.' : '— 개선이 필요한 수준입니다.'}</span>
                  </p>
                  <p>• 강한 신호(매수지수 &gt;70 또는 &lt;30) 정확도:
                    <span className="font-bold ml-1" style={{ color: strongAcc >= 65 ? '#22c55e' : '#f59e0b' }}>{strongAcc}%</span>
