// ─── 유틸 ──────────────────────────────────────────────────────────────────

function scoreToColor(s) {
  if (s >= 3)  return '#22c55e';
  if (s >= 1)  return '#86efac';
  if (s === 0) return '#94a3b8';
  if (s >= -2) return '#f97316';
  return '#ef4444';
}

function scoreToPercent(s) {
  return ((s + 5) / 10) * 100;
}

function directionLabel(d) {
  if (d === 'bullish')  return { text: '강세 (Bullish)', color: '#22c55e', bg: 'rgba(34,197,94,0.15)' };
  if (d === 'bearish')  return { text: '약세 (Bearish)', color: '#ef4444', bg: 'rgba(239,68,68,0.15)' };
  return { text: '중립 (Neutral)', color: '#94a3b8', bg: 'rgba(148,163,184,0.1)' };
}

function confidenceDot(c) {
  if (c === 'high')   return { color: '#22c55e', label: '신뢰도 높음' };
  if (c === 'medium') return { color: '#f59e0b', label: '신뢰도 보통' };
  return { color: '#ef4444', label: '신뢰도 낮음 ⚠ 수동 검토 필요' };
}

// ─── API 호출 ─────────────────────────────────────────────────────────────

async function geminiPostWithRetry(apiKey, body, retries = 4) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  let lastError;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const res = await fetch(url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
    if (res.ok) return res.json();
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    const retryable = res.status === 503 || res.status === 429 || res.status === 500;
    if (!retryable) throw new Error(msg);
    lastError = new Error(msg);
    if (attempt < retries) await new Promise(r => setTimeout(r, (attempt + 1) * 3000 + Math.random() * 1000));
  }
  throw lastError;
}

async function analyzeNews(apiKey, newsItem) {
  const userContent = `Analyze this Tesla-related news for TSLA stock impact:\n\nTitle: ${newsItem.title}\n\nSummary: ${newsItem.summary}\n\nSource: ${newsItem.source} | Date: ${newsItem.date} | Category: ${newsItem.category}`;

  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: [{ role: 'user', parts: [{ text: userContent }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      maxOutputTokens: 8192,
      temperature: 0.2,
      thinkingConfig: { thinkingBudget: 0 },
    },
  };

  const data = await geminiPostWithRetry(apiKey, body);
  addApiUsage('analysis', data.usageMetadata); // 토큰 사용량 추적
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // JSON 파싱 — responseMimeType=application/json 이지만 방어적으로 처리
  const cleaned = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('JSON 파싱 실패: ' + raw.slice(0, 100));
  return JSON.parse(jsonMatch[0]);
}

// ─── 컴포넌트: ImpactGauge ─────────────────────────────────────────────────

function ImpactGauge({ score }) {
  const pct = scoreToPercent(score);
  const col = scoreToColor(score);
  return (
    <div className="mt-3">
      <div className="flex items-center justify-between mb-1">
        <span className="text-xs text-gray-500 font-mono">−5</span>
        <span className="text-xs font-bold" style={{ color: col }}>
          Impact: {score > 0 ? '+' : ''}{score}
        </span>
        <span className="text-xs text-gray-500 font-mono">+5</span>
      </div>
      {/* track */}
      <div className="relative h-3 rounded-full overflow-hidden" style={{ background: '#1e222a' }}>
        {/* gradient background */}
        <div className="absolute inset-0 gauge-track opacity-20 rounded-full" />
        {/* neutral line */}
        <div className="absolute top-0 bottom-0 w-px bg-gray-500 opacity-40" style={{ left: '50%' }} />
        {/* fill */}
        <div
          className="absolute top-0 bottom-0 rounded-full transition-all duration-700"
          style={{
            background: col,
            left: score >= 0 ? '50%' : `${pct}%`,
            width: `${Math.abs(score) * 10}%`,
            boxShadow: `0 0 8px ${col}80`,
          }}
        />
        {/* needle */}
        <div
          className="absolute top-0 bottom-0 w-0.5 rounded-full transition-all duration-700"
          style={{ left: `calc(${pct}% - 1px)`, background: col, boxShadow: `0 0 6px ${col}` }}
        />
      </div>
    </div>
  );
}

// ─── 컴포넌트: RuleBadges ──────────────────────────────────────────────────

function RuleBadges({ rules }) {
  if (!rules || rules.length === 0) return null;
  return (
    <div className="flex flex-wrap gap-1 mt-2">
      {rules.map(r => {
        const meta = RULES_META[r];
        if (!meta) return null;
        return (
          <span
            key={r}
            className="badge-rule"
            title={`${r}: ${meta.label} (${meta.cat})`}
            style={{ color: meta.color, borderColor: meta.color, background: meta.bg }}
          >
            {r} · {meta.label}
          </span>
        );
      })}
    </div>
  );
}

          </div>
        </div>
        {result && (
          <span
            className="text-xs font-bold px-2 py-1 rounded-lg shrink-0 whitespace-nowrap"
            style={{ color: dir.color, background: dir.bg, border: `1px solid ${dir.color}40` }}
          >
            {result.direction === 'bullish' ? '📈 강세' : result.direction === 'bearish' ? '📉 약세' : '➡ 중립'}

        )}
        {loading && (

        )}
      </div>

      {/* summary */}
      <p className="text-xs text-gray-400 leading-relaxed line-clamp-2">{news.summary}</p>

      {/* result section */}
      {result && (
        <div className="mt-3 pt-3 border-t border-gray-800">
          <ImpactGauge score={result.impact_score} />

            "{result.reasoning}"

              {result.key_factors?.map((f, i) => (

            <span className="text-xs shrink-0 flex items-center gap-1" style={{ color: conf.color }}>
              <span className="w-1.5 h-1.5 rounded-full inline-block" style={{ background: conf.color }} />
              {conf.label}
            </span>
          </div>
        </div>
      )}

      {error && (
        <div className="mt-3 pt-3 border-t border-red-900">
          <p className="text-xs text-red-400">⚠ 분석 오류: {error}</p>
        </div>
      )}

  );
}

// ─── 컴포넌트: SummaryPanel ────────────────────────────────────────────────

function SummaryPanel({ results }) {
  const done = Object.values(results).filter(r => r && r.impact_score !== undefined);
  if (done.length === 0) return null;

  const avg = done.reduce((s, r) => s + r.impact_score, 0) / done.length;
  const bullish = done.filter(r => r.direction === 'bullish').length;
  const bearish = done.filter(r => r.direction === 'bearish').length;
  const neutral = done.filter(r => r.direction === 'neutral').length;
  const overall = avg >= 1 ? 'bullish' : avg <= -1 ? 'bearish' : 'neutral';
  const dir = directionLabel(overall);

  // 평균 게이지
  const avgPct = scoreToPercent(Math.round(avg));
  const avgCol = scoreToColor(avg);

  // 룰 집계
  const allRules = {};
  done.forEach(r => r.triggered_rules?.forEach(rule => { allRules[rule] = (allRules[rule] || 0) + 1; }));
  const topRules = Object.entries(allRules).sort((a, b) => b[1] - a[1]).slice(0, 8);

  return (
    <div className="rounded-xl p-5 border mt-6" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-sm font-bold text-gray-200 uppercase tracking-wider">종합 분석 결과</h2>
        <span
          className="text-sm font-bold px-3 py-1 rounded-lg"
          style={{ color: dir.color, background: dir.bg, border: `1px solid ${dir.color}50` }}
        >
          {dir.text}
        </span>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        {/* avg score */}
        <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid #2A2D35' }}>
          <p className="text-xs text-gray-500 mb-1">평균 Impact Score</p>
          <p className="text-2xl font-bold" style={{ color: avgCol }}>
            {avg >= 0 ? '+' : ''}{avg.toFixed(1)}
          </p>
          <div className="mt-2 h-2 rounded-full overflow-hidden" style={{ background: '#1e222a' }}>
            <div
              className="h-full rounded-full summary-meter-fill"
              style={{
                marginLeft: avg >= 0 ? '50%' : `${avgPct}%`,
                width: `${Math.abs(avg) * 10}%`,
                background: avgCol,
              }}
            />
          </div>
        </div>

        {/* direction counts */}
        <div className="rounded-lg p-3" style={{ background: '#14171e', border: '1px solid #2A2D35' }}>
          <p className="text-xs text-gray-500 mb-2">방향성 분포</p>
          <div className="space-y-1.5">
            {[['Bullish', bullish, '#22c55e'], ['Bearish', bearish, '#ef4444'], ['Neutral', neutral, '#94a3b8']].map(([label, cnt, col]) => (
              <div key={label} className="flex items-center gap-2">
                <span className="text-xs w-14" style={{ color: col }}>{label}</span>

const API_USAGE_KEY = 'tsla_api_usage_v1';

function getApiUsage() {
  try {
    const d = JSON.parse(localStorage.getItem(API_USAGE_KEY) || 'null');
    return d || { inputTokens: 0, outputTokens: 0, collectCalls: 0, analysisCalls: 0, sinceDate: new Date().toISOString().split('T')[0] };
  } catch { return { inputTokens: 0, outputTokens: 0, collectCalls: 0, analysisCalls: 0, sinceDate: new Date().toISOString().split('T')[0] }; }
}
function addApiUsage(type, meta) {
  try {
    const u = getApiUsage();
    u.inputTokens  += meta?.promptTokenCount     || 0;
    u.outputTokens += meta?.candidatesTokenCount || 0;
    if (type === 'collect') u.collectCalls++; else u.analysisCalls++;
    u.lastDate = new Date().toISOString().split('T')[0];
    localStorage.setItem(API_USAGE_KEY, JSON.stringify(u));
  } catch {}
}
function resetApiUsage() {
  try { localStorage.removeItem(API_USAGE_KEY); } catch {}
}

// OAuth 토큰 발급 (GIS 팝업)
function driveRequestToken(clientId) {
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) {
      reject(new Error('Google Identity Services 미로드')); return;
    }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      callback: (resp) => {
        if (resp.error) reject(new Error(resp.error_description || resp.error));
        else resolve(resp.access_token);
      },
    });
    client.requestAccessToken({ prompt: '' });
  });
}

// Drive에서 기존 파일 ID 검색
async function driveFindFile(token) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name+%3D+%27${DRIVE_FILE_NAME}%27&fields=files(id)`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error(`Drive 파일 검색 실패 (${res.status})`);
  const data = await res.json();
  return data.files?.[0]?.id || null;
}

// Drive에서 세션 데이터 읽기
async function driveReadSessions(token) {
  const fileId = await driveFindFile(token);
  if (!fileId) return [];
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error(`Drive 읽기 실패 (${res.status})`);
  const data = await res.json();
  return Array.isArray(data.sessions) ? data.sessions : [];
}

// Drive에 세션 데이터 저장 (생성 또는 업데이트)
async function driveWriteSessions(token, sessions) {
  const fileId = await driveFindFile(token);
  const body = JSON.stringify({ sessions, updatedAt: new Date().toISOString() });
  const meta = { name: DRIVE_FILE_NAME, parents: fileId ? undefined : ['appDataFolder'] };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(fileId ? {} : meta)], { type: 'application/json' }));
  form.append('file', new Blob([body], { type: 'application/json' }));

  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const method = fileId ? 'PATCH' : 'POST';

  const res = await fetch(url, { method, headers: { Authorization: `Bearer ${token}` }, body: form });
  if (!res.ok) throw new Error(`Drive 저장 실패 (${res.status})`);
}

// 로컬 + Drive 세션 병합 (합집합, 최신 60개)
function mergeSessions(local, remote) {
  const map = {};
  remote.forEach(s => { if (s?.id) map[s.id] = s; });
  local.forEach(s => { if (s?.id) map[s.id] = s; }); // 로컬이 우선
  return Object.values(map)
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
    .slice(0, 60);
}

    }],
    generationConfig: { maxOutputTokens: 8192, temperature: 0.1, thinkingConfig: { thinkingBudget: 0 } }
  };
  const data = await geminiPostWithRetry(apiKey, body);
  addApiUsage('collect', data.usageMetadata); // 토큰 사용량 추적
  // thought 파트를 제외하고 실제 텍스트 파트만 합침 (gemini-2.5-flash thinking 대응)
  const parts = data.candidates?.[0]?.content?.parts || [];

  const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const start = cleaned.indexOf('[');

  if (start === -1 || end === -1) throw new Error('뉴스 JSON 파싱 실패: ' + raw.slice(0, 200));

// ─── 실시간 TSLA 52주 주봉 (Stooq → allorigins fallback) ────────────────

async function fetchTSLAWeeklyData() {
  // Stooq CSV 파싱 공통 함수
  function parseStooqCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim() && !l.toLowerCase().startsWith('date'));
    if (lines.length < 4) throw new Error('데이터 부족');
    const items = lines.map(line => {
      const c = line.split(',');
      return { date: new Date(c[0]), open: +c[1], high: +c[2], low: +c[3], close: +c[4] };
    }).filter(d => d.close > 0 && !isNaN(d.close));
    // Stooq는 최신순 → 오래된순으로 reverse
    items.reverse();
    const last52 = items.slice(-52);
    const currentPrice = Math.round(last52[last52.length - 1].close * 100) / 100;
    return { items: last52, currentPrice };
  }

  const STOOQ = 'https://stooq.com/q/d/l/?s=tsla.us&i=w';

  // 1순위: Stooq 직접
  try {
    const res = await fetch(STOOQ, { cache: 'no-store' });
    if (res.ok) {
      const text = await res.text();
      return parseStooqCSV(text);
    }
  } catch {}

  // 2순위: allorigins 프록시 경유
  try {
    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(STOOQ), { cache: 'no-store' });
    if (res.ok) {
      const wrapper = await res.json();
      return parseStooqCSV(wrapper.contents || '');
    }
  } catch {}

  // 3순위: corsproxy.io 경유
  const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(STOOQ), { cache: 'no-store' });
  if (!res.ok) throw new Error(`Stooq HTTP ${res.status}`);
  const text = await res.text();
  return parseStooqCSV(text);
}

async function generateForecast(apiKey, items, currentPrice = 247) {
  const summary = items.map(it =>

    generationConfig: { responseMimeType: 'application/json', maxOutputTokens: 8192, temperature: 0.3, thinkingConfig: { thinkingBudget: 0 } },
  };

}

// ─── 컴포넌트: WeeklyCandlestickChart ─────────────────────────────────────

function WeeklyCandlestickChart({ data }) {
  const W = 700, H = 200;
  const P = { t: 12, r: 50, b: 24, l: 54 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;
  const allP = data.flatMap(d => [d.high, d.low]);
  const minP = Math.min(...allP) * 0.994, maxP = Math.max(...allP) * 1.006;
  const xPos = i => P.l + (i + 0.5) * (cW / data.length);
  const yPos = p => P.t + (1 - (p - minP) / (maxP - minP)) * cH;
  const bW = Math.max(1.5, cW / data.length - 1.5);
  const yTicks = Array.from({ length: 5 }, (_, i) => minP + (i / 4) * (maxP - minP));
  const curP = data[data.length - 1].close;
  const curCol = curP >= data[data.length - 2]?.close ? '#22c55e' : '#ef4444';
  return (
    <div style={{ width: '100%', overflowX: 'auto' }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', minWidth: 320, display: 'block' }}>
        {yTicks.map(p => (
          <g key={p}>
            <line x1={P.l} y1={yPos(p)} x2={W - P.r} y2={yPos(p)} stroke="#2A2D35" strokeWidth="0.8" strokeDasharray="3,3" />
            <text x={P.l - 5} y={yPos(p) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9.5">${Math.round(p)}</text>
          </g>
        ))}
        {data.map((d, i) => {
          const x = xPos(i), up = d.close >= d.open, col = up ? '#22c55e' : '#ef4444';
          const bY = yPos(Math.max(d.open, d.close)), bH = Math.max(1, yPos(Math.min(d.open, d.close)) - bY);
          return (
            <g key={i}>
              <line x1={x} y1={yPos(d.high)} x2={x} y2={yPos(d.low)} stroke={col} strokeWidth="0.8" />
              <rect x={x - bW / 2} y={bY} width={bW} height={bH} fill={col} fillOpacity="0.85" />
            </g>
          );
        })}
        <line x1={P.l} y1={yPos(curP)} x2={W - P.r + 2} y2={yPos(curP)} stroke={curCol} strokeWidth="1" strokeDasharray="4,2" />
        <text x={W - P.r + 4} y={yPos(curP) + 3.5} fill={curCol} fontSize="9" fontWeight="700">${Math.round(curP)}</text>
        {data.filter((_, i) => i % 8 === 0 || i === data.length - 1).map((d, j) => {
          const i = data.indexOf(d);
          return <text key={j} x={xPos(i)} y={H - 5} textAnchor="middle" fill="#6b7280" fontSize="8.5">
            {d.date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })}
          </text>;
        })}
      </svg>
    </div>
  );
}

function ForecastBuyIndexChart({ forecasts }) {
  const W = 640, H = 170;
  const P = { t: 28, r: 20, b: 38, l: 38 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;
  const xPos = i => P.l + (i / (forecasts.length - 1)) * cW;
  const yPos = v => P.t + (1 - v / 100) * cH;
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';
  const pts = forecasts.map((f, i) => [xPos(i), yPos(f.buy_index)]);
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const areaPath = `M${xPos(0)},${P.t + cH} ` + pts.map(p => `L${p[0]},${p[1]}`).join(' ') + ` L${xPos(forecasts.length - 1)},${P.t + cH}Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" x2="1" y1="0" y2="0">
          {forecasts.map((f, i) => <stop key={i} offset={`${(i / (forecasts.length - 1)) * 100}%`} stopColor={bCol(f.buy_index)} stopOpacity="0.25" />)}
        </linearGradient>
      </defs>
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={P.l} y1={yPos(v)} x2={W - P.r} y2={yPos(v)} stroke={v === 50 ? '#4b5563' : '#2A2D35'} strokeWidth={v === 50 ? 1 : 0.7} strokeDasharray="3,3" />
          <text x={P.l - 5} y={yPos(v) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9">{v}</text>
        </g>
      ))}
      <path d={areaPath} fill="url(#areaGrad)" />
      <path d={linePath} fill="none" stroke="#64748b" strokeWidth="1.5" strokeLinejoin="round" />
      {forecasts.map((f, i) => {
        const x = xPos(i), y = yPos(f.buy_index), col = bCol(f.buy_index);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="5" fill={col} stroke="#0D0F14" strokeWidth="2" />
            <text x={x} y={y - 10} textAnchor="middle" fill={col} fontSize="11" fontWeight="700">{f.buy_index}</text>
            <text x={x} y={H - 20} textAnchor="middle" fill={col} fontSize="8.5">{f.signal}</text>
            <text x={x} y={H - 8} textAnchor="middle" fill="#9ca3af" fontSize="10" fontWeight="600">{f.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── 컴포넌트: TrendChart ─────────────────────────────────────────────────

function TrendChart({ sessions, prediction, prediction7 }) {
  if (!sessions || sessions.length === 0) return (
    <div className="flex flex-col items-center justify-center py-14 text-gray-600">
      <p className="text-3xl mb-3">📭</p>
      <p className="text-sm">저장된 분석 세션이 없습니다.</p>
      <p className="text-xs mt-1">대시보드에서 뉴스를 수집하고 분석을 실행해보세요.</p>
    </div>
  );

  // ── 일별 평균 그룹핑 ──────────────────────────────────────────
  const grouped = {};
  sessions.forEach(s => {
    const date = s.date || '?';
    if (!grouped[date]) grouped[date] = { date, values: [], hasCollected: false };
    const v = s.buyIndex ?? (s.avgScore != null ? Math.round((s.avgScore + 5) / 10 * 100) : null);
    if (v != null && !isNaN(v)) grouped[date].values.push(v);
    if (s.source === 'collected') grouped[date].hasCollected = true;
  });
  const data = Object.entries(grouped)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, g]) => ({
      date,
      value: g.values.length ? Math.round(g.values.reduce((a, b) => a + b, 0) / g.values.length) : null,
      count: g.values.length,
      source: g.hasCollected ? 'collected' : 'sample',
    }))
    .filter(d => d.value != null);

  if (data.length === 0) return <div className="py-8 text-center text-xs text-gray-600">매수지수 데이터가 없습니다.</div>;

  const preds = Array.isArray(prediction7) && prediction7.length > 0 ? prediction7 : (prediction ? [prediction] : []);
  const W = 720, H = 240;
  const P = { t: 30, r: 28, b: 60, l: 44 };
  const cW = W - P.l - P.r, cH = H - P.t - P.b;

  // 총 슬롯 = 실제 날짜 수 + 예측 개수
  const totalSlots = data.length + preds.length;
  const xPos = i => P.l + (totalSlots <= 1 ? cW / 2 : (i / (totalSlots - 1)) * cW);
  const yPos = v => P.t + (1 - v / 100) * cH;
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';

  const pts = data.map((d, i) => [xPos(i), yPos(d.value)]);
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const areaPath = `M${xPos(0)},${P.t + cH} ` + pts.map(p => `L${p[0]},${p[1]}`).join(' ') + ` L${xPos(data.length - 1)},${P.t + cH}Z`;

  const lastPt = pts[pts.length - 1];
  // 예측 포인트 좌표 계산
  const predPts = preds.map((p, i) => [xPos(data.length + i), yPos(p.value)]);
  // 예측 점선 경로 (마지막 실제 → 예측들)
  const predPath = lastPt && predPts.length > 0
    ? `M${lastPt[0]},${lastPt[1]} ` + predPts.map(p => `L${p[0]},${p[1]}`).join(' ')
    : null;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block' }}>
      <defs>
        <linearGradient id="trendGrad" x1="0" x2="1" y1="0" y2="0">
          {data.map((d, i) => <stop key={i} offset={`${(i / Math.max(data.length - 1, 1)) * 100}%`} stopColor={bCol(d.value)} stopOpacity="0.22" />)}
        </linearGradient>
      </defs>

      {/* 그리드 + Y라벨 */}
      {[0, 25, 50, 75, 100].map(v => (
        <g key={v}>
          <line x1={P.l} y1={yPos(v)} x2={W - P.r} y2={yPos(v)} stroke={v === 50 ? '#4b5563' : '#2A2D35'} strokeWidth={v === 50 ? 1 : 0.7} strokeDasharray="3,3" />
          <text x={P.l - 5} y={yPos(v) + 3.5} textAnchor="end" fill="#6b7280" fontSize="9">{v}</text>
        </g>
      ))}

      {/* Zone */}
      <rect x={P.l} y={yPos(100)} width={cW} height={yPos(65) - yPos(100)} fill="rgba(34,197,94,0.04)" />
      <rect x={P.l} y={yPos(65)}  width={cW} height={yPos(45) - yPos(65)}  fill="rgba(245,158,11,0.04)" />
      <rect x={P.l} y={yPos(45)}  width={cW} height={yPos(0)  - yPos(45)}  fill="rgba(239,68,68,0.04)" />

      {/* 실제 데이터 영역 + 선 */}
      {data.length > 1 && <path d={areaPath} fill="url(#trendGrad)" />}
      {data.length > 1 && <path d={linePath} fill="none" stroke="#475569" strokeWidth="1.8" strokeLinejoin="round" />}

      {/* 예측 점선 */}
      {predPath && (
        <path d={predPath} fill="none" stroke="#a78bfa" strokeWidth="1.6" strokeDasharray="5,3" opacity="0.7" />
      )}

      {/* 실제 데이터 포인트 */}
      {data.map((d, i) => {
        const [x, y] = pts[i]; const col = bCol(d.value);
        return (
          <g key={i}>
            <circle cx={x} cy={y} r="5.5" fill={col} stroke="#0D0F14" strokeWidth="2" />
            <text x={x} y={y - 11} textAnchor="middle" fill={col} fontSize="10.5" fontWeight="700">{d.value}</text>
            {d.count > 1 && <text x={x} y={y - 22} textAnchor="middle" fill="#6b7280" fontSize="7.5">({d.count}회 평균)</text>}
            <text x={x} y={H - 40} textAnchor="middle" fill="#6b7280" fontSize="8.5" transform={`rotate(-30,${x},${H - 40})`}>{d.date?.slice(5)}</text>
            <text x={x} y={H - 16} textAnchor="middle" fill="#4b5563" fontSize="8">{d.source === 'collected' ? '🔍' : '📋'}</text>
          </g>
        );
      })}

      {/* 7일 예측 포인트 */}
      {preds.map((pred, i) => {
        const [px, py] = predPts[i];
        const col = bCol(pred.value);
        const isFirst = i === 0;
        return (
          <g key={`pred-${i}`}>
            {isFirst
              ? <><circle cx={px} cy={py} r="9" fill="none" stroke={col} strokeWidth="1.5" strokeDasharray="3,2" opacity="0.5" /><circle cx={px} cy={py} r="4.5" fill={col} opacity="0.8" stroke="#0D0F14" strokeWidth="1.5" /></>
              : <circle cx={px} cy={py} r="3.5" fill={col} opacity="0.55" stroke="#0D0F14" strokeWidth="1" />
            }
            {/* 수치 — 첫날은 크게, 나머지 짝수만 표시 */}
            {(isFirst || i % 2 === 0) && (
              <text x={px} y={py - (isFirst ? 16 : 11)} textAnchor="middle" fill={col} fontSize={isFirst ? "10" : "8"} fontWeight={isFirst ? "700" : "500"} opacity={isFirst ? 1 : 0.75}>
                {pred.value}
              </text>
            )}
            {/* 날짜 라벨 */}
            <text x={px} y={H - 40} textAnchor="middle" fill="#a78bfa" fontSize="7.5" opacity="0.7" transform={`rotate(-30,${px},${H - 40})`}>{pred.dateLabel || `+${pred.day}일`}</text>
            {/* 신뢰도 — 마지막 포인트에만 */}
            {i === preds.length - 1 && (
              <text x={px} y={H - 16} textAnchor="middle" fill="#7c3aed" fontSize="7" opacity="0.8">({pred.confLabel})</text>
            )}
          </g>
        );
      })}

      <text x={10} y={P.t + cH / 2} textAnchor="middle" fill="#6b7280" fontSize="9" transform={`rotate(-90,10,${P.t + cH / 2})`}>매수지수</text>
    </svg>
  );
}

// ─── 모바일: 뉴스 카드 (탭으로 접기/펼치기) ───────────────────────────────────
function MobileNewsCard({ news, result, loading, error, onAnalyze, apiKey }) {
  const [open, setOpen] = useState(false);
  const score = result?.impact_score;
  const dir   = result?.direction;
  const sc = dir === 'bullish' ? '#22c55e' : dir === 'bearish' ? '#ef4444' : '#9ca3af';
  const bg = dir === 'bullish' ? 'rgba(34,197,94,0.12)' : dir === 'bearish' ? 'rgba(239,68,68,0.12)' : 'rgba(255,255,255,0.04)';
  const bd = dir === 'bullish' ? 'rgba(34,197,94,0.3)' : dir === 'bearish' ? 'rgba(239,68,68,0.3)' : '#2A2D35';
  return (
    <div className="rounded-xl overflow-hidden" style={{ background: '#1C1F26', border: `1px solid ${bd}` }}>
      <button className="w-full p-3 text-left" onClick={() => setOpen(o => !o)}>
        <div className="flex items-start gap-2.5">
          <div className="shrink-0 w-11 h-11 rounded-lg flex items-center justify-center font-bold text-sm"
            style={{ background: bg, color: sc, border: `1px solid ${bd}` }}>
            {loading
              ? <span className="w-4 h-4 border-2 border-current border-t-transparent rounded-full spinning" />
              : score != null ? (score > 0 ? '+' : '') + score
              : <span className="text-gray-700" style={{ fontSize: 9 }}>미분석</span>}
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-xs font-semibold text-gray-200 leading-snug"
              style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
              {news.title}
            </p>
            <p className="text-xs text-gray-600 mt-0.5">{news.source} · {news.category}</p>
          </div>
          <span className="shrink-0 text-gray-700 text-xs">{open ? '▲' : '▼'}</span>
        </div>
        {result && !open && (
          <div className="flex items-center gap-1.5 mt-2 flex-wrap">
            <span className="text-xs px-1.5 py-0.5 rounded font-semibold" style={{ background: bg, color: sc }}>
              {dir === 'bullish' ? '📈 상승' : dir === 'bearish' ? '📉 하락' : '➡ 중립'}
            </span>
            {result.triggered_rules?.slice(0, 3).map(r => {
              const m = RULES_META[r];
              return m ? <span key={r} className="badge-rule" style={{ color: m.color, borderColor: m.color, background: m.bg }}>{r}</span> : null;
            })}
          </div>
        )}
      </button>
      {open && (
        <div className="border-t px-3 pb-3 pt-2.5 space-y-2" style={{ borderColor: '#2A2D35', background: '#14171e' }}>
          <p className="text-xs text-gray-400 leading-relaxed">{news.summary}</p>
          {result && <>
            <p className="text-xs text-gray-500 italic leading-relaxed">💬 {result.reasoning}</p>
            <div className="flex flex-wrap gap-1 mt-1">
              {result.triggered_rules?.map(r => {
                const m = RULES_META[r];
                return m ? <span key={r} className="badge-rule" style={{ color: m.color, borderColor: m.color, background: m.bg }}>{r}</span> : null;
              })}
            </div>
            <div className="flex gap-2 text-xs mt-1">
              <span className="px-2 py-0.5 rounded font-semibold" style={{ background: bg, color: sc }}>
                {dir === 'bullish' ? '📈 상승' : dir === 'bearish' ? '📉 하락' : '➡ 중립'}
              </span>
              <span className="text-gray-600">{result.confidence === 'high' ? '신뢰도 높음' : result.confidence === 'medium' ? '신뢰도 보통' : '⚠ 신뢰도 낮음'}</span>
            </div>
          </>}
          {!result && !loading && (
            <button onClick={() => onAnalyze(news)} disabled={!apiKey}
              className="w-full py-2 rounded-lg text-xs font-bold text-white disabled:opacity-40"
              style={{ background: '#E31937' }}>▶ 단독 분석</button>
          )}
          {error && <p className="text-xs text-red-400">⚠ {error}</p>}
        </div>
      )}
    </div>
  );
}

      <div className="px-3 pt-3 space-y-3">
        {/* 액션 버튼 */}
        <div className="grid grid-cols-2 gap-2">
          <button onClick={handleCollect} disabled={collectLoading || !apiKey}
            className="py-3.5 rounded-xl text-sm font-bold text-white disabled:opacity-40 active:opacity-70 flex items-center justify-center gap-2"
            style={{ background: collectLoading ? '#374151' : '#0891b2' }}>
            {collectLoading
              ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spinning" />수집 중</>
              : '🔍 뉴스 수집'}
          </button>
          <button onClick={analyzeAll} disabled={analyzing || !apiKey || pendingCount === 0}
            className="py-3.5 rounded-xl text-sm font-bold text-white disabled:opacity-40 active:opacity-70 flex items-center justify-center gap-2"
            style={{ background: analyzing ? '#374151' : pendingCount === 0 ? '#374151' : '#E31937' }}>
            {analyzing
              ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spinning" />분석 중</>
              : pendingCount === 0 ? '✓ 완료' : `▶ 분석 (${pendingCount}건)`}
          </button>
        </div>

        {/* 상태 배너 */}
        {isCollected && !collectError && (
          <div className="px-3 py-2 rounded-lg flex items-center gap-2 text-xs"
            style={{ background: 'rgba(8,145,178,0.1)', border: '1px solid rgba(8,145,178,0.25)' }}>
            <span className="text-cyan-400 font-bold">🔍 실시간 수집</span>
            <span className="text-gray-500">{currentNews.length}건</span>
            {isSaved && <span className="ml-auto text-green-400 font-semibold">✅ 저장완료</span>}
          </div>
        )}
        {collectError && (
          <div className="px-3 py-2 rounded-lg text-xs text-red-400"
            style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.2)' }}>⚠ {collectError}</div>
        )}
        {cachedCount > 0 && (
          <button onClick={clearCache} disabled={analyzing} className="w-full text-xs text-gray-600 py-1">
            🗑 캐시 초기화 ({cachedCount}건)
          </button>
        )}

        {/* 분석 요약 카드 */}
        {hasAnyResult && (
          <div className="rounded-xl p-4" style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
            <div className="flex items-center justify-between mb-3">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">분석 요약</p>
              <span className="text-sm font-bold" style={{ color: oc }}>
                {overall === 'bullish' ? '📈 상승 우세' : overall === 'bearish' ? '📉 하락 우세' : '➡ 중립'}
              </span>
            </div>
            <div className="grid grid-cols-4 gap-1.5 mb-3">
              {[
                ['평균', avg != null ? (avg >= 0 ? '+' : '') + avg : '─', avg != null ? (avg >= 0 ? '#22c55e' : '#ef4444') : '#6b7280'],
                ['상승', bull, '#22c55e'],
                ['하락', bear, '#ef4444'],
                ['중립', neu,  '#9ca3af'],
              ].map(([l, v, c]) => (
                <div key={l} className="text-center py-2 rounded-lg" style={{ background: '#14171e' }}>
                  <p className="text-sm font-bold" style={{ color: c }}>{v}</p>
                  <p className="text-xs text-gray-600">{l}</p>
                </div>
              ))}
            </div>
            {done.length > 0 && (
              <div className="flex rounded-full overflow-hidden h-1.5">
                <div style={{ width: `${bull/done.length*100}%`, background: '#22c55e', transition: 'width .5s' }} />
                <div style={{ width: `${neu/done.length*100}%`,  background: '#4b5563', transition: 'width .5s' }} />
                <div style={{ width: `${bear/done.length*100}%`, background: '#ef4444', transition: 'width .5s' }} />
              </div>
            )}
          </div>
        )}

        {/* 뉴스 목록 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs font-semibold text-gray-600 uppercase tracking-wider">뉴스 {currentNews.length}건</p>
            {isCollected && <span className="text-xs text-cyan-500">실시간</span>}
          </div>
          <div className="space-y-2">
            {currentNews.map(news => (
              <MobileNewsCard key={news.id} news={news}
                result={results[news.id]} loading={loading[news.id]}
                error={errors[news.id]} onAnalyze={analyzeSingle} apiKey={apiKey} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 컴포넌트: TrendPage ──────────────────────────────────────────────────

function TrendPage({ onBack, onPullFromDrive, onPushToDrive, driveSyncing, driveConnected, driveLastSync, driveError }) {
  const [db, setDB] = useState(() => getNewsDB());
  const [expanded, setExpanded] = useState(null);
  const [autoSessions, setAutoSessions] = useState([]);
  const [autoLoading, setAutoLoading] = useState(true);
  const [autoLastSync, setAutoLastSync] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [checkedIds, setCheckedIds] = useState(new Set());

  const refresh = () => setDB(getNewsDB());

  const toggleEditMode = () => { setEditMode(v => !v); setCheckedIds(new Set()); setExpanded(null); };
  const toggleCheck = (id, e) => { e.stopPropagation(); setCheckedIds(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; }); };
  const toggleAll = () => {
    const allIds = autoSessions.map(s => s.id);
    const allChecked = allIds.every(id => checkedIds.has(id));
    setCheckedIds(allChecked ? new Set() : new Set(allIds));
  };
  const deleteSelected = () => {
    if (checkedIds.size === 0) return;
    const cur = getNewsDB();
    cur.sessions = (cur.sessions || []).filter(s => !checkedIds.has(s.id));
    saveNewsDB(cur);
    setCheckedIds(new Set());
    setEditMode(false);
    refresh();
  };

  // 자동 세션 불러오기
  useEffect(() => {
    setAutoLoading(true);
    fetchAutoSessions().then(arr => {
      setAutoSessions(arr);
      setAutoLastSync(arr[0]?.kstTime ? `${arr[0].date} ${arr[0].kstTime} KST` : null);
      setAutoLoading(false);
    });
  }, []);

  // Drive에서 불러온 후 로컬 갱신
  const handlePull = async () => { await onPullFromDrive?.(); refresh(); };

  const localSessions = db.sessions || [];
  const sessions = autoSessions.slice().sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  const valid = sessions.filter(s => s.buyIndex != null || s.avgScore != null);
  const latest = valid[0]?.buyIndex ?? null;
  const avg = valid.length ? Math.round(valid.reduce((s, x) => s + (x.buyIndex ?? 50), 0) / valid.length) : null;
  const trend = valid.length >= 2 ? ((valid[0]?.buyIndex ?? 50) > (valid[1]?.buyIndex ?? 50) ? '↑ 상승' : '↓ 하락') : '─';
  const trendCol = trend.startsWith('↑') ? '#22c55e' : trend.startsWith('↓') ? '#ef4444' : '#6b7280';
  const bCol = v => v >= 65 ? '#22c55e' : v >= 45 ? '#f59e0b' : '#ef4444';
  const clearDB = () => { if (confirm('모든 수집 기록을 삭제할까요?')) { saveNewsDB({ sessions: [] }); refresh(); } };

  // ─── 등급 정의 ──────────────────────────────────────────────────────────
  const GRADES = [
    { min: 81, max: 100, grade: 'S', label: '적극매수', color: '#22c55e', bg: 'rgba(34,197,94,0.12)',  desc: '강력한 매수 신호. 다수 호재 집중, 모멘텀 최상' },
    { min: 61, max: 80,  grade: 'A', label: '매수',    color: '#86efac', bg: 'rgba(134,239,172,0.1)', desc: '우호적 환경. 단기 상승 가능성 높음' },
    { min: 45, max: 60,  grade: 'B', label: '관망',    color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', desc: '방향성 불명확. 추가 뉴스 모니터링 권장' },
    { min: 25, max: 44,  grade: 'C', label: '매도',    color: '#f97316', bg: 'rgba(249,115,22,0.12)', desc: '부정적 신호 우세. 비중 축소 고려' },
    { min: 0,  max: 24,  grade: 'D', label: '적극매도', color: '#ef4444', bg: 'rgba(239,68,68,0.15)',  desc: '다수 악재 집중. 강한 하락 압력' },
  ];
  const getGrade = v => GRADES.find(g => v >= g.min && v <= g.max) || GRADES[2];

  // ─── 7일 예측 (선형 회귀) ───────────────────────────────────────────────
  const predict7Days = () => {
    if (valid.length === 0) return [];
    const basePts = [...valid].reverse().slice(-8).map((s, i) => ({ x: i, y: s.buyIndex ?? 50 }));
    const n = basePts.length;
    const confidence = valid.length >= 5 ? 'high' : valid.length >= 3 ? 'medium' : 'low';
    const confLabel = confidence === 'high' ? '높음' : confidence === 'medium' ? '보통' : '낮음';
    const confColor = confidence === 'high' ? '#22c55e' : confidence === 'medium' ? '#f59e0b' : '#6b7280';
    if (n < 2) {
      const v = basePts[0]?.y ?? 50;
      return Array.from({ length: 7 }, (_, i) => ({ value: v, day: i + 1, confidence, confLabel, confColor, slope: 0 }));
    }
    const sx = basePts.reduce((s, p) => s + p.x, 0), sy = basePts.reduce((s, p) => s + p.y, 0);
    const sxy = basePts.reduce((s, p) => s + p.x * p.y, 0), sx2 = basePts.reduce((s, p) => s + p.x * p.x, 0);
    const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx || 1);
    const intercept = (sy - slope * sx) / n;
    return Array.from({ length: 7 }, (_, i) => {
      const raw = intercept + slope * (n + i);
      // 날짜 계산
      const d = new Date(); d.setDate(d.getDate() + i + 1);
      const dateLabel = `${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return {
        value: Math.min(100, Math.max(0, Math.round(raw))),
        day: i + 1, dateLabel, confidence, confLabel, confColor,
        slope: Math.round(slope * 10) / 10,
      };
    });
  };
  const prediction7 = predict7Days();
  const prediction = prediction7[0] ?? null;
  return (
    <div className="max-w-6xl mx-auto px-3 py-4 md:px-4 md:py-6">
      {/* Header */}
      <div className="mb-4 md:mb-6">
        {/* 타이틀 행 */}
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2">
            <button onClick={onBack} className="text-xs px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white transition-colors shrink-0" style={{ background: '#252830', border: '1px solid #2A2D35' }}>← 뒤로</button>
            <div>
              <h1 className="text-base md:text-xl font-bold text-white tracking-tight leading-tight">TSLA 매수지수 트렌드</h1>
              <p className="text-xs text-gray-600 leading-tight hidden md:block">
                종합 수집 타임라인 DB · 이력 분석
              </p>
            </div>
          </div>
          {/* 자동분석 상태 + 버튼 (오른쪽) */}
          <div className="flex items-center gap-1.5 shrink-0">
            <span className="text-xs hidden sm:inline" style={{ color: autoLoading ? '#60a5fa' : autoLastSync ? '#22c55e' : '#6b7280' }}>
              {autoLoading ? '🤖 로딩 중…' : autoLastSync ? `🤖 ${autoLastSync}` : ''}
            </span>
            <button onClick={refresh} className="text-xs px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white" style={{ background: '#252830', border: '1px solid #2A2D35' }}>↻</button>
            {sessions.length > 0 && <button onClick={clearDB} className="text-xs px-2.5 py-1.5 rounded-lg text-red-400" style={{ background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.2)' }}>🗑</button>}
          </div>
        </div>
        {/* Drive 버튼 행 — PC만 */}
        {driveConnected && (
          <div className="hidden md:flex gap-2 items-center">
            <button onClick={handlePull} disabled={driveSyncing}
              className="text-xs px-3 py-1.5 rounded-lg font-semibold text-white hover:opacity-90 disabled:opacity-40"
              style={{ background: '#1d4ed8' }}>
              {driveSyncing ? '⏳ 동기화 중…' : '⬇ Drive 불러오기'}
            </button>
            <button onClick={onPushToDrive} disabled={driveSyncing}
              className="text-xs px-3 py-1.5 rounded-lg font-semibold text-white hover:opacity-90 disabled:opacity-40"
              style={{ background: '#7c3aed' }}>⬆ Drive 저장</button>
            {driveLastSync && <span className="text-xs text-gray-600">동기화: {driveLastSync}</span>}
          </div>
        )}
      </div>

      {/* Stats — 통합 프레임 */}
      <div className="rounded-xl mb-4 md:mb-5" style={{ background: '#1C1F26', border: '1px solid #2A2D35' }}>
        <div className="grid grid-cols-3 divide-x" style={{ borderColor: '#2A2D35' }}>
          {[
            ['최근 매수지수', latest ?? '─', latest ? bCol(latest) : '#6b7280'],
            ['평균 매수지수', avg    ?? '─', avg    ? bCol(avg)    : '#6b7280'],
            ['추세',          trend,          trendCol],
          ].map(([label, val, col], i) => (
            <div key={label} className="flex flex-col items-center justify-center py-4 px-3 gap-1">
              <p className="text-xs text-gray-500">{label}</p>
              <p className="text-xl md:text-2xl font-bold leading-none" style={{ color: col }}>{val}</p>
              {i === 0 && latest != null && (
                <span className="text-xs font-bold px-1.5 py-0.5 rounded mt-0.5"
                  style={{ background: getGrade(latest).bg, color: getGrade(latest).color }}>
                  {getGrade(latest).grade}등급
                </span>
              )}
            </div>
          ))}
        </div>
      </div>
      {/* 뉴스 브리핑 + 오늘 평가/내일 예측 */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">

        {/* 오늘의 뉴스 브리핑 */}
        <div className="rounded-xl border p-4 flex flex-col" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">📰 오늘의 뉴스 브리핑</p>
          {valid.length === 0 ? (
            <div className="flex flex-col items-center justify-center flex-1 text-gray-600 min-h-32">
              <p className="text-2xl mb-2">📭</p>
              <p className="text-xs">분석 데이터 없음</p>
            </div>
          ) : (() => {
            const s = valid[0];
            const news = s.news || [];
            const analyses = s.analyses || {};
            const analyzed = news
              .filter(n => analyses[n.id])
              .map(n => ({ ...n, ...analyses[n.id] }))
              .sort((a, b) => Math.abs(b.impact_score) - Math.abs(a.impact_score));
            const topNews = analyzed.slice(0, 3);
            const bull = s.bullish || 0;
            const bear = s.bearish || 0;
            const neu = typeof s.neutral === 'number' ? s.neutral : (analyzed.length - bull - bear);
            const dominantDir = bull > bear ? '강세' : bear > bull ? '약세' : '중립';
            const dirEmoji = bull > bear ? '📈' : bear > bull ? '📉' : '➡';
            const dirColor = bull > bear ? '#22c55e' : bear > bull ? '#ef4444' : '#f59e0b';
            const topRules = (s.topRules || []).slice(0, 3);
            // 카테고리 집계
            const cats = {};
            analyzed.forEach(n => { if (n.category) cats[n.category] = (cats[n.category] || 0) + 1; });
            const topCats = Object.entries(cats).sort((a,b) => b[1]-a[1]).slice(0, 3).map(([c]) => c);
            // 코멘트 생성
            const ruleText = topRules.length ? ` 주요 트리거 룰: ${topRules.join(', ')}.` : '';
            const topTitle = topNews[0] ? topNews[0].title : '';
            const comment = `${s.date} 기준 ${s.analyzedCount || analyzed.length}건 뉴스 분석 — ${dirEmoji} ${dominantDir} 우세 (강세 ${bull} · 약세 ${bear} · 중립 ${neu}건).${ruleText}${topTitle ? ` 가장 주목할 이슈는 "${topTitle.length > 45 ? topTitle.slice(0,45)+'…' : topTitle}"입니다.` : ''}`;
            return (
              <div className="flex flex-col gap-3 flex-1">
                {/* 방향 인디케이터 */}
                <div className="flex items-center gap-2">
                  <span className="text-lg">{dirEmoji}</span>
                  <span className="text-xs font-bold" style={{ color: dirColor }}>{dominantDir} 우세</span>
                  <span className="text-xs text-gray-600">·</span>
                  <div className="flex gap-1">
                    {topCats.map(c => (
                      <span key={c} className="text-xs px-1.5 py-0.5 rounded" style={{ background: '#252830', color: '#94a3b8' }}>{c}</span>
                    ))}
                  </div>
                </div>
                {/* 코멘트 박스 */}
                <div className="p-3 rounded-lg" style={{ background: '#14171e', border: '1px solid #2a2d35' }}>
                  <p className="text-xs text-gray-300 leading-relaxed">{comment}</p>
                </div>
                {/* 상위 뉴스 3건 */}
                <div className="space-y-1.5 flex-1">
                  {topNews.map(n => (
                    <div key={n.id} className="flex items-start gap-2 px-2 py-2 rounded" style={{ background: '#14171e' }}>
                      <span className="text-xs font-black shrink-0 mt-0.5 w-7 text-right" style={{ color: n.impact_score >= 0 ? '#22c55e' : '#ef4444' }}>
                        {n.impact_score >= 0 ? '+' : ''}{n.impact_score}
                      </span>
                      <p className="text-xs text-gray-400 leading-snug flex-1 min-w-0"
                        style={{ display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                        {n.title}
                      </p>
                    </div>
                  ))}
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-700">{s.source === 'auto' ? '🤖 자동 수집' : s.source === 'collected' ? '🔍 실시간 수집' : '📋 샘플'}</span>
                  <span className="text-xs text-gray-700">{s.date} {s.kstTime ? s.kstTime + ' KST' : ''}</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* 오늘의 평가 + 내일 예측 (통합) */}
        <div className="rounded-xl border p-4" style={{ background: '#1C1F26', borderColor: '#2A2D35' }}>
          {latest == null && prediction == null ? (
            <div className="flex flex-col items-center justify-center h-40 text-gray-600">
              <p className="text-3xl mb-2">📭</p>
              <p className="text-xs">분석 데이터 없음</p>
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-0 divide-x" style={{ borderColor: '#2A2D35' }}>
              {/* 오늘의 평가 */}
              <div className="pr-4 flex flex-col gap-3">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">📅 오늘의 평가</p>
                {latest == null ? (
                  <div className="flex items-center justify-center h-24 text-gray-600 text-xs">데이터 없음</div>
                ) : (() => {
                  const g = getGrade(latest);
                  const todaySession = valid[0];
                  const vsAvg = avg != null ? latest - avg : null;
                  return (
                    <>
                      <div className="flex items-center gap-3">
                        <div className="flex flex-col items-center justify-center w-14 h-14 rounded-xl shrink-0"
                          style={{ background: g.bg, border: `2px solid ${g.color}` }}>
                          <span className="text-xl font-black" style={{ color: g.color }}>{g.grade}</span>
                        </div>
                        <div>
                          <p className="text-2xl font-black leading-none" style={{ color: g.color }}>{latest}</p>
                          <p className="text-xs font-bold mt-0.5" style={{ color: g.color }}>{g.label}</p>
                          <p className="text-xs text-gray-600 mt-0.5">{todaySession?.date}</p>
                        </div>
                      </div>
                      <p className="text-xs text-gray-400 leading-relaxed px-2 py-1.5 rounded" style={{ background: '#14171e' }}>{g.desc}</p>
                      <div className="flex flex-wrap gap-2 text-xs">
                        {vsAvg != null && (
                          <span className="px-2 py-1 rounded" style={{ background: '#252830', color: vsAvg >= 0 ? '#22c55e' : '#ef4444' }}>
                            평균 대비 {vsAvg >= 0 ? '+' : ''}{vsAvg}p
                          </span>
                        )}
                        {todaySession?.overallSignal && (
                          <span className="px-2 py-1 rounded" style={{ background: '#252830', color: '#94a3b8' }}>
                            {todaySession.overallSignal}
                          </span>
                        )}
                      </div>
                    </>
                  );
                })()}
              </div>

              {/* 내일 예측 */}
              <div className="pl-4 flex flex-col gap-3">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">🔮 내일 예측</p>
                {prediction == null ? (
                  <div className="flex items-center justify-center h-24 text-gray-600 text-xs">데이터 없음</div>
                ) : (() => {
                  const g = getGrade(prediction.value);
                  const delta = latest != null ? prediction.value - latest : null;
                  return (
                    <>
                      <div className="flex items-center gap-3">
                        <div className="flex flex-col items-center justify-center w-14 h-14 rounded-xl shrink-0"
                          style={{ background: g.bg, border: `2px solid ${g.color}`, opacity: 0.85 }}>
                          <span className="text-xl font-black" style={{ color: g.color }}>{g.grade}</span>
                        </div>
                        <div>
                          <p className="text-2xl font-black leading-none" style={{ color: g.color }}>{prediction.value}</p>

                      <p className="text-xs text-gray-700 leading-tight">※ 통계 모델 예측</p>

        <div className="px-5 py-4 border-b flex items-center justify-between gap-2 flex-wrap" style={{ borderColor: '#2A2D35' }}>

            {editMode && checkedIds.size > 0 && (

        {sessions.length === 0 ? (

            <p className="text-3xl mb-3">📭</p>

            <p className="text-xs text-gray-700 mt-1">대시보드 → 뉴스 수집 → 분석 실행 → 자동 저장됩니다.</p>

            {sessions.map(s => {

              const bi = s.buyIndex;
              const biCol = bi != null ? bCol(bi) : '#6b7280';
              return (
                <div key={s.id} style={editMode && checkedIds.has(s.id) ? { background: '#ef444408' } : {}}>
                  <button className="w-full px-3 md:px-5 py-3 md:py-4 flex items-center gap-2 md:gap-3 hover:bg-gray-900 transition-colors text-left"
                    onClick={() => { if (editMode && s.source !== 'auto') { setCheckedIds(prev => { const ns = new Set(prev); ns.has(s.id) ? ns.delete(s.id) : ns.add(s.id); return ns; }); } else if (!editMode) { setExpanded(isExp ? null : s.id); } }}

                    <div className="shrink-0 w-20 md:w-24">
                      <p className="text-xs font-semibold text-gray-300 truncate">{s.date}</p>
                      <p className="text-xs text-gray-600">{s.source === 'auto' ? `🤖 ${s.kstTime || '자동'}` : s.source === 'collected' ? '🔍 실시간' : '📋 샘플'}</p>

                    {/* 매수지수 */}
                    {bi != null && <div className="shrink-0 text-center w-10 md:w-12">
                      <p className="text-base md:text-lg font-bold" style={{ color: biCol }}>{bi}</p>
                      <p className="text-xs text-gray-600 hidden md:block">매수지수</p>
                    </div>}
                    {/* 평균점수 */}
                    <div className="shrink-0 text-center w-9 md:w-12">
                      <p className="text-xs md:text-sm font-bold" style={{ color: s.avgScore >= 0 ? '#22c55e' : '#ef4444' }}>{s.avgScore >= 0 ? '+' : ''}{s.avgScore?.toFixed(1) ?? '─'}</p>
                      <p className="text-xs text-gray-600 hidden md:block">평균</p>
                    </div>
                    {/* 룰 + 신호 */}
                    <div className="flex-1 flex items-center gap-1.5 flex-wrap overflow-hidden">
